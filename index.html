<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Text Tool</title>
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%2044%2044'%3E%3Crect%20x='2'%20y='2'%20width='40'%20height='40'%20rx='9'%20fill='%23131519'%20stroke='%232c2e33'/%3E%3Crect%20x='7'%20y='7'%20width='30'%20height='30'%20rx='4'%20fill='none'%20stroke='%23ffb454'%20stroke-opacity='.28'%20stroke-dasharray='3%203'/%3E%3Cpath%20d='M14.5%2015%20H29.5%20V18%20H23.5%20V30%20H20.5%20V18%20H14.5%20Z'%20fill='%23ffb454'/%3E%3C/svg%3E"
    />
    <style>
      /* ============================================================
     TEXT TOOL — a character/string dissection instrument.
     Aesthetic: "laboratory oscilloscope" — near-black canvas,
     hairline grid, warm amber signal color, cool cyan for meta.
     ============================================================ */

      :root {
        --bg: #0c0d0f;
        --bg-grid: rgba(255, 255, 255, 0.02);
        --panel: #131519;
        --panel-2: #16191e;
        --line: rgba(255, 255, 255, 0.075);
        --line-soft: rgba(255, 255, 255, 0.045);
        --ink: #e9e6df; /* warm off-white */
        --ink-dim: #9aa0a8;
        --ink-faint: #61666e;
        --amber: #ffb454; /* primary signal */
        --amber-dim: #b9823a;
        --cyan: #5fc9d6; /* secondary / meta */
        --cyan-dim: #3f7d87; /* muted cyan — UTF-8 structure bits */
        --violet: #a99bf0; /* rare tertiary for flags */
        --rose: #f0768b; /* warnings */
        --green: #93d07f;
        --mono:
          ui-monospace, "SF Mono", "SFMono-Regular", Menlo, Consolas,
          "Liberation Mono", monospace;
        --sans:
          "Inter", ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto,
          sans-serif;
        --radius: 10px;
      }

      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
      }
      body {
        background:
          linear-gradient(var(--bg-grid) 1px, transparent 1px) 0 0 / 100% 26px,
          linear-gradient(90deg, var(--bg-grid) 1px, transparent 1px) 0 0 / 26px
            100%,
          radial-gradient(
            1200px 600px at 78% -10%,
            rgba(255, 180, 84, 0.05),
            transparent 60%
          ),
          var(--bg);
        color: var(--ink);
        font-family: var(--sans);
        font-size: 15px;
        line-height: 1.5;
        -webkit-font-smoothing: antialiased;
        min-height: 100vh;
      }

      .page {
        max-width: 1120px;
        margin: 0 auto;
        padding: 34px 26px 90px;
      }

      /* ---------- header ---------- */
      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 24px;
        flex-wrap: wrap;
        padding-bottom: 22px;
        border-bottom: 1px solid var(--line);
        margin-bottom: 26px;
      }
      .brand {
        display: flex;
        align-items: center;
        gap: 15px;
      }
      .logo {
        width: 44px;
        height: 44px;
        flex: 0 0 auto;
        display: block;
      }
      .logo svg {
        width: 44px;
        height: 44px;
        display: block;
      }
      .logo-frame {
        fill: var(--panel);
        stroke: var(--line);
        stroke-width: 1;
      }
      .logo-dash {
        fill: none;
        stroke: rgba(255, 180, 84, 0.28);
        stroke-width: 1;
        stroke-dasharray: 3 3;
      }
      .logo-t {
        fill: var(--amber);
      }
      h1 {
        font-size: 20px;
        margin: 0;
        letter-spacing: 0.02em;
        font-weight: 650;
      }
      .github-link {
        display: grid;
        place-items: center;
        width: 40px;
        height: 40px;
        border: 1px solid var(--line);
        border-radius: 9px;
        background: var(--panel);
        color: var(--ink-dim);
        transition: 0.14s;
      }
      .github-link:hover {
        color: var(--amber);
        border-color: rgba(255, 180, 84, 0.45);
        background: #1b1f25;
        transform: translateY(-1px);
      }
      .github-link svg {
        width: 20px;
        height: 20px;
      }

      /* ---------- input ---------- */
      .input-card {
        position: relative;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: var(--panel);
        overflow: hidden;
      }
      .accent-rail {
        position: absolute;
        left: 0;
        top: 0;
        bottom: 0;
        width: 3px;
        background: linear-gradient(var(--amber), var(--amber-dim));
        opacity: 0.75;
      }
      .input-card label {
        display: block;
        font-family: var(--mono);
        font-size: 11px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--ink-faint);
        padding: 12px 16px 0 20px;
      }
      #input {
        width: 100%;
        min-height: 104px;
        resize: vertical;
        border: 0;
        outline: 0;
        background: transparent;
        color: var(--ink);
        font-family: var(--mono);
        font-size: 22px;
        line-height: 1.45;
        padding: 10px 16px 16px 20px;
      }
      #input::placeholder {
        color: var(--ink-faint);
      }
      .toolbar {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        padding: 10px 16px 12px 20px;
        border-top: 1px solid var(--line-soft);
        align-items: center;
      }
      .sample-chip {
        font-family: var(--mono);
        font-size: 12px;
        color: var(--ink-dim);
        background: var(--panel-2);
        border: 1px solid var(--line);
        padding: 5px 10px;
        border-radius: 7px;
        cursor: pointer;
        transition: 0.12s;
      }
      .sample-chip:hover {
        color: var(--ink);
        border-color: rgba(255, 180, 84, 0.4);
        background: #1b1f25;
      }
      .sample-chip.subtle {
        color: var(--ink-faint);
      }
      .spacer {
        flex: 1;
      }

      /* ---------- warning banner ---------- */
      #warn {
        margin-top: 16px;
        display: none;
      }
      #warn.visible {
        display: block;
      }
      .warning-banner {
        border: 1px solid rgba(240, 118, 139, 0.35);
        background: rgba(240, 118, 139, 0.07);
        border-radius: var(--radius);
        padding: 12px 16px;
        font-size: 13.5px;
        color: #f4b3bd;
        display: flex;
        gap: 12px;
        align-items: flex-start;
      }
      .warning-icon {
        color: var(--rose);
        font-family: var(--mono);
        font-weight: 700;
      }
      .warning-banner b {
        color: #ffd7de;
      }

      /* ---------- stats ---------- */
      .stats {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
        gap: 1px;
        background: var(--line);
        border: 1px solid var(--line);
        border-radius: var(--radius);
        overflow: hidden;
        margin-top: 16px;
      }
      .stat {
        background: var(--panel);
        padding: 14px 16px;
      }
      .stat-value {
        font-family: var(--mono);
        font-size: 25px;
        font-weight: 600;
        color: var(--amber);
        line-height: 1;
      }
      .stat-label {
        font-size: 11px;
        letter-spacing: 0.09em;
        text-transform: uppercase;
        color: var(--ink-faint);
        margin-top: 7px;
      }

      /* ---------- section scaffolding ---------- */
      section {
        margin-top: 30px;
      }
      .section-header {
        display: flex;
        align-items: baseline;
        gap: 12px;
        margin-bottom: 14px;
      }
      .section-header h2 {
        font-size: 13px;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: var(--ink-dim);
        margin: 0;
        font-weight: 600;
      }
      .section-divider {
        flex: 1;
        height: 1px;
        background: var(--line-soft);
      }
      .section-hint {
        font-family: var(--mono);
        font-size: 11px;
        color: var(--ink-faint);
      }

      /* ---------- grapheme strip ---------- */
      .grapheme-strip {
        display: flex;
        flex-wrap: wrap;
        gap: 9px;
      }
      .grapheme-cell {
        position: relative;
        min-width: 58px;
        border: 1px solid var(--line);
        border-radius: 9px;
        background: var(--panel);
        padding: 10px 8px 8px;
        cursor: pointer;
        transition: 0.12s;
        text-align: center;
      }
      .grapheme-cell:hover {
        border-color: rgba(255, 180, 84, 0.5);
        background: #1a1e24;
        transform: translateY(-1px);
      }
      .grapheme-cell.selected {
        border-color: var(--amber);
        background: #1d2026;
        box-shadow:
          0 0 0 1px var(--amber) inset,
          0 6px 20px rgba(0, 0, 0, 0.4);
      }
      .grapheme-cell .glyph {
        font-family: var(--sans);
        font-size: 30px;
        line-height: 1.15;
        min-height: 38px;
        color: var(--ink);
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .cell-index {
        position: absolute;
        top: 4px;
        left: 6px;
        font-family: var(--mono);
        font-size: 9.5px;
        color: var(--ink-faint);
      }
      .cell-codepoint {
        font-family: var(--mono);
        font-size: 10px;
        color: var(--ink-faint);
        margin-top: 5px;
      }
      .cell-badge {
        position: absolute;
        top: 4px;
        right: 5px;
        font-family: var(--mono);
        font-size: 9px;
        color: var(--cyan);
        background: rgba(95, 201, 214, 0.1);
        border-radius: 4px;
        padding: 1px 4px;
      }
      .nonprint-label {
        font-family: var(--mono);
        font-size: 12px;
        color: var(--rose);
      }

      /* ---------- inspector ---------- */
      .inspector-grid {
        display: grid;
        grid-template-columns: 260px 1fr;
        gap: 18px;
      }
      @media (max-width: 820px) {
        .inspector-grid {
          grid-template-columns: 1fr;
        }
      }

      .specimen {
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: var(--panel);
        overflow: hidden;
        align-self: start;
      }
      /* only stick in the two-column layout; static once stacked so it can't overlap */
      @media (min-width: 821px) {
        .specimen {
          position: sticky;
          top: 16px;
        }
      }
      .specimen-canvas {
        height: 190px;
        display: grid;
        place-items: center;
        font-size: 96px;
        color: var(--ink);
        background:
          linear-gradient(var(--line-soft) 1px, transparent 1px) 0 0/100% 19px,
          linear-gradient(90deg, var(--line-soft) 1px, transparent 1px) 0 0/19px
            100%,
          #101216;
        border-bottom: 1px solid var(--line);
        position: relative;
        word-break: break-all;
        text-align: center;
        padding: 8px;
      }
      .nonprint-note {
        font-family: var(--mono);
        font-size: 15px;
        color: var(--rose);
        text-align: center;
        line-height: 1.5;
      }
      .specimen-meta {
        padding: 14px 16px;
      }
      .specimen-codepoint {
        font-family: var(--mono);
        font-size: 20px;
        color: var(--amber);
      }
      .specimen-name {
        font-size: 13px;
        color: var(--ink);
        margin-top: 6px;
        line-height: 1.4;
      }
      .specimen-sub {
        font-family: var(--mono);
        font-size: 11.5px;
        color: var(--ink-faint);
        margin-top: 8px;
      }

      .pill-row {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        padding: 0 16px 16px;
      }
      .pill {
        font-family: var(--mono);
        font-size: 10.5px;
        padding: 3px 8px;
        border-radius: 20px;
        border: 1px solid var(--line);
        color: var(--ink-dim);
      }
      .pill.pill-cyan {
        color: #101216;
        background: var(--cyan);
        border-color: var(--cyan);
        font-weight: 600;
      }
      .pill.pill-amber {
        color: #101216;
        background: var(--amber);
        border-color: var(--amber);
        font-weight: 600;
      }
      .pill.pill-violet {
        color: #101216;
        background: var(--violet);
        border-color: var(--violet);
        font-weight: 600;
      }

      /* code-point selector for multi-codepoint clusters */
      .codepoint-tabs {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
        margin-bottom: 14px;
      }
      .codepoint-tabs:empty {
        display: none;
        margin: 0;
      }
      .codepoint-tab {
        font-family: var(--mono);
        font-size: 11.5px;
        color: var(--ink-dim);
        background: var(--panel-2);
        border: 1px solid var(--line);
        padding: 6px 10px;
        border-radius: 7px;
        cursor: pointer;
        display: flex;
        gap: 7px;
        align-items: center;
      }
      .codepoint-tab:hover {
        border-color: rgba(255, 180, 84, 0.4);
        color: var(--ink);
      }
      .codepoint-tab.selected {
        border-color: var(--amber);
        color: var(--amber);
      }
      .tab-role {
        color: var(--ink-faint);
        font-size: 10px;
      }
      .codepoint-tab.selected .tab-role {
        color: var(--amber-dim);
      }

      /* ---------- detail table ---------- */
      .detail-table {
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: var(--panel);
        overflow: hidden;
      }
      .detail-group {
        border-top: 1px solid var(--line-soft);
      }
      .detail-group:first-child {
        border-top: 0;
      }
      .group-title {
        font-family: var(--mono);
        font-size: 10.5px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--amber-dim);
        padding: 10px 16px 4px;
      }
      .detail-row {
        display: grid;
        grid-template-columns: 170px 1fr;
        gap: 14px;
        padding: 6px 16px;
        align-items: baseline;
        transition: background 0.1s;
      }
      .detail-row:hover {
        background: #181c21;
      }
      .detail-row .field-label {
        font-size: 12px;
        color: var(--ink-dim);
      }
      .detail-row .field-value {
        font-family: var(--mono);
        font-size: 13px;
        color: var(--ink);
        word-break: break-all;
      }
      .val-accent {
        color: var(--amber);
      }
      .val-cyan {
        color: var(--cyan);
      }
      .val-dim {
        color: var(--ink-faint);
      }
      @media (max-width: 560px) {
        .detail-row {
          grid-template-columns: 1fr;
          gap: 2px;
        }
      }

      /* value cells that host a copy button */
      .field-value {
        position: relative;
        padding-right: 24px;
      }
      .copy-btn {
        position: absolute;
        right: 0;
        top: 0;
        width: 20px;
        height: 20px;
        display: grid;
        place-items: center;
        border: 0;
        padding: 0;
        background: transparent;
        color: var(--ink-faint);
        cursor: pointer;
        opacity: 0;
        transition:
          opacity 0.12s,
          color 0.12s;
      }
      .detail-row:hover .copy-btn,
      .field-row:hover .copy-btn {
        opacity: 1;
      }
      .copy-btn:hover {
        color: var(--amber);
      }
      .copy-btn.copied {
        color: var(--green);
        opacity: 1;
      }
      .copy-btn svg {
        width: 13px;
        height: 13px;
        fill: none;
        stroke: currentColor;
        stroke-width: 1.4;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      /* ---------- info tooltip ---------- */
      .has-tip {
        cursor: help;
      } /* no underline — just a help cursor */
      #tooltip {
        position: fixed;
        z-index: 60;
        max-width: 290px;
        pointer-events: none;
        opacity: 0;
        transform: translateY(4px);
        transition:
          opacity 0.12s,
          transform 0.12s;
        background: #1c1f25;
        color: var(--ink);
        border: 1px solid var(--line);
        box-shadow: 0 10px 34px rgba(0, 0, 0, 0.55);
        border-radius: 9px;
        padding: 9px 12px;
        font-family: var(--sans);
        font-size: 12.5px;
        line-height: 1.45;
      }
      #tooltip.visible {
        opacity: 1;
        transform: translateY(0);
      }
      #tooltip::before {
        content: "";
        position: absolute;
        left: var(--arrow-x, 20px);
        bottom: -5px;
        width: 9px;
        height: 9px;
        background: #1c1f25;
        border-right: 1px solid var(--line);
        border-bottom: 1px solid var(--line);
        transform: rotate(45deg);
      }
      #tooltip.tooltip-below::before {
        top: -5px;
        bottom: auto;
        border: 0;
        border-left: 1px solid var(--line);
        border-top: 1px solid var(--line);
      }

      /* ---------- UTF-8 byte matrix ---------- */
      .byte-grid {
        display: flex;
        flex-wrap: wrap;
        gap: 7px;
        padding: 4px 16px 8px;
      }
      .byte-cell {
        border: 1px solid var(--line);
        border-radius: 7px;
        background: #101216;
        padding: 7px 9px;
        text-align: center;
        min-width: 72px;
      }
      .byte-hex {
        font-family: var(--mono);
        font-size: 14px;
        color: var(--amber);
      }
      .byte-bin {
        font-family: var(--mono);
        font-size: 10px;
        letter-spacing: 0.05em;
        margin-top: 3px;
      }
      .byte-dec {
        font-family: var(--mono);
        font-size: 9.5px;
        color: var(--ink-faint);
        margin-top: 2px;
      }
      .byte-label {
        font-family: var(--mono);
        font-size: 8.5px;
        color: var(--ink-faint);
        margin-top: 4px;
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }
      .bit-marker {
        color: var(--cyan-dim);
      } /* UTF-8 structural prefix bits */
      .bit-data {
        color: var(--cyan);
        font-weight: 600;
      } /* actual code-point payload bits */
      .byte-legend {
        display: flex;
        gap: 16px;
        padding: 0 16px 14px;
        font-family: var(--mono);
        font-size: 10px;
        color: var(--ink-faint);
      }
      .byte-legend .swatch {
        display: inline-block;
        width: 9px;
        height: 9px;
        border-radius: 2px;
        margin-right: 5px;
        vertical-align: middle;
      }
      .swatch.marker {
        background: var(--cyan-dim);
      }
      .swatch.data {
        background: var(--cyan);
      }

      /* ---------- string-level cards ---------- */
      .column-pair {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 18px;
      }
      @media (max-width: 820px) {
        .column-pair {
          grid-template-columns: 1fr;
        }
      }
      .card {
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: var(--panel);
        overflow: hidden;
      }
      .card-header {
        font-family: var(--mono);
        font-size: 10.5px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--ink-dim);
        padding: 12px 16px;
        border-bottom: 1px solid var(--line-soft);
        display: flex;
        justify-content: space-between;
      }
      .status-same {
        color: var(--green);
        text-transform: none;
        letter-spacing: 0;
      }
      .status-diff {
        color: var(--rose);
        text-transform: none;
        letter-spacing: 0;
      }
      .hex-dump {
        font-family: var(--mono);
        font-size: 12px;
        line-height: 1.7;
        padding: 12px 16px;
        overflow-x: auto;
        white-space: pre;
        color: var(--ink);
      }
      .dump-dim {
        color: var(--ink-faint);
      }
      .dump-ascii {
        color: var(--cyan);
      }
      .field-list {
        padding: 8px 16px 14px;
      }
      .field-row {
        display: grid;
        grid-template-columns: 130px 1fr;
        gap: 12px;
        padding: 5px 0;
        align-items: baseline;
      }
      .field-row:hover {
        background: #181c21;
      }
      .field-row .field-label {
        font-size: 12px;
        color: var(--ink-dim);
      }
      .field-row .field-value {
        font-family: var(--mono);
        font-size: 12.5px;
        color: var(--ink);
        word-break: break-all;
      }

      ::selection {
        background: rgba(255, 180, 84, 0.28);
      }
      .empty-state {
        color: var(--ink-faint);
        font-family: var(--mono);
        font-size: 13px;
        padding: 40px 0;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div class="page">
      <header>
        <div class="brand">
          <span class="logo" aria-hidden="true">
            <svg viewBox="0 0 44 44">
              <rect
                class="logo-frame"
                x="0.75"
                y="0.75"
                width="42.5"
                height="42.5"
                rx="9"
              />
              <rect
                class="logo-dash"
                x="5.5"
                y="5.5"
                width="33"
                height="33"
                rx="5"
              />
              <path
                class="logo-t"
                d="M14.5 15 H29.5 V18 H23.5 V30 H20.5 V18 H14.5 Z"
              />
            </svg>
          </span>
          <div><h1>Text Tool</h1></div>
        </div>
        <a
          class="github-link"
          href="https://tcboni.github.io/text-tool/"
          target="_blank"
          rel="noopener"
          aria-label="View on GitHub"
        >

      /* ============================================================
   ENCODING HELPERS
   ============================================================ */

      function utf8Bytes(cp) {
        if (cp <= 0x7f) return [cp];
        if (cp <= 0x7ff) return [0xc0 | (cp >> 6), 0x80 | (cp & 0x3f)];
        if (cp <= 0xffff)
          return [
            0xe0 | (cp >> 12),
            0x80 | ((cp >> 6) & 0x3f),
            0x80 | (cp & 0x3f),
          ];
        return [
          0xf0 | (cp >> 18),
          0x80 | ((cp >> 12) & 0x3f),
          0x80 | ((cp >> 6) & 0x3f),
          0x80 | (cp & 0x3f),
        ];
      }
      function utf16Units(cp) {
        if (cp <= 0xffff) return [cp];
        const c = cp - 0x10000;
        return [0xd800 + (c >> 10), 0xdc00 + (c & 0x3ff)];
      }
      const bin = (n, w) => n.toString(2).padStart(w, "0");
      const hex = (n, w = 2) => n.toString(16).toUpperCase().padStart(w, "0");
      const oct = (n) => n.toString(8);
      function b64(bytes) {
        let s = "";
        for (const b of bytes) s += String.fromCharCode(b);
        return btoa(s);
      }
      function groupBits(str, size = 4) {
        // pretty-print a bitstring
        const out = [];
        for (let i = 0; i < str.length; i += size)
          out.push(str.slice(i, i + size));
        return out.join(" ");
      }
      // number of leading structural bits in a UTF-8 byte (rest are code-point payload bits)
      function utf8MarkerBits(b) {
        if ((b & 0x80) === 0) return 1; // 0xxxxxxx  single/ASCII
        if ((b & 0xc0) === 0x80) return 2; // 10xxxxxx  continuation
        if ((b & 0xe0) === 0xc0) return 3; // 110xxxxx  2-byte lead
        if ((b & 0xf0) === 0xe0) return 4; // 1110xxxx  3-byte lead
        if ((b & 0xf8) === 0xf0) return 5; // 11110xxx  4-byte lead
        return 0;
      }
      // render a byte's 8 bits, colouring structure vs code-point bits
      function binColored(b) {
        const bits = bin(b, 8).split("");
        const marker = utf8MarkerBits(b);
        let out = "";
        bits.forEach((bit, i) => {
          out +=
            '<span class="' +
            (i < marker ? "bit-marker" : "bit-data") +
            '">' +
            bit +
            "</span>";
          if (i === 3) out += " ";
        });
        return out;
      }

      /* ============================================================
   PER-CODEPOINT PROPERTIES
   ============================================================ */

      function testP(prop, ch) {
        try {
          return new RegExp("\\p{" + prop + "}", "u").test(ch);
        } catch (e) {
          return false;
        }
      }

      function blockOf(cp) {
        for (const [a, b, name] of BLOCKS) if (cp >= a && cp <= b) return name;
        return "Unassigned / No Block";
      }
      function categoryOf(ch) {
        for (const c of GC_ORDER) {
          if (testP("gc=" + c, ch)) return c;
        }
        return "Cn";
      }
      function scriptOf(ch) {
        for (const s of SCRIPTS) {
          if (testP("Script=" + s, ch)) return s;
        }
        return "Unknown";
      }
      function nameOf(cp, ch, cat) {
        if (cp in CONTROL_NAMES && cp <= 0x9f) return CONTROL_NAMES[cp];
        if (cp in SPECIAL_NAMES) return SPECIAL_NAMES[cp];
        if (cp >= 0x1f3fb && cp <= 0x1f3ff)
          return (
            "EMOJI MODIFIER FITZPATRICK TYPE-" +
            (cp - 0x1f3fb < 2
              ? "1-2"
              : cp - 0x1f3fb < 3
                ? "3"
                : cp - 0x1f3fb < 4
                  ? "4"
                  : cp - 0x1f3fb < 5
                    ? "5"
                    : "6")
          );
        if (cp >= 0x1f1e6 && cp <= 0x1f1ff)
          return (
            "REGIONAL INDICATOR SYMBOL LETTER " +
            String.fromCharCode(65 + (cp - 0x1f1e6))
          );
        if (cp >= 0xe0020 && cp <= 0xe007e)
          return "TAG " + JSON.stringify(String.fromCodePoint(cp - 0xe0000));
        if (cp === 0xe007f) return "CANCEL TAG";
        if (cat === "Co") return "<private-use>";
        if (cat === "Cs") return "<surrogate>";
        if (cat === "Cn") return "<unassigned>";
        return null; // no local name DB — properties describe it instead
      }

      // role of a codepoint inside a grapheme cluster (for emoji dissection)
      function roleOf(cp, ch) {
        if (cp === 0x200d) return "zero-width joiner";
        if (cp === 0xfe0f) return "emoji presentation (VS16)";
        if (cp === 0xfe0e) return "text presentation (VS15)";
        if (cp >= 0xfe00 && cp <= 0xfe0f) return "variation selector";
        if (cp >= 0xe0100 && cp <= 0xe01ef) return "variation selector supp.";
        if (cp >= 0x1f3fb && cp <= 0x1f3ff) return "skin-tone modifier";
        if (cp >= 0x1f1e6 && cp <= 0x1f1ff) return "regional indicator";
        if (cp >= 0xe0020 && cp <= 0xe007f) return "tag";
        if (testP("gc=Mn", ch)) return "combining mark";
        if (testP("gc=Mc", ch)) return "spacing mark";
        if (testP("gc=Me", ch)) return "enclosing mark";
        if (testP("Extended_Pictographic", ch)) return "pictographic base";
        return "base";
      }

      function analyzeCodepoint(cp) {
        const ch = String.fromCodePoint(cp);
        const cat = categoryOf(ch);
        const bytes = utf8Bytes(cp);
        const units = utf16Units(cp);
        const isControl =
          cat === "Cc" ||
          cat === "Cf" ||
          cat === "Cs" ||
          cat === "Co" ||
          cat === "Cn";
        const isSpace = testP("White_Space", ch);
        const zeroWidth =
          [0x200b, 0x200c, 0x200d, 0x2060, 0xfeff].includes(cp) ||
          (cp >= 0xfe00 && cp <= 0xfe0f) ||
          (cp >= 0xe0100 && cp <= 0xe01ef);
        const combining =
          testP("gc=Mn", ch) || testP("gc=Mc", ch) || testP("gc=Me", ch);
        const isEmoji = testP("Emoji", ch);
        const isPict = testP("Extended_Pictographic", ch);
        const printable = !isControl && !zeroWidth && cp !== 0x20 && cp > 0x1f;

        return {
          cp,
          ch,
          cat,
          catName: GC[cat],
          name: nameOf(cp, ch, cat),
          role: roleOf(cp, ch),
          script: scriptOf(ch),
          block: blockOf(cp),
          bytes,
          units,
          flags: {
            letter: testP("L", ch),
            number: testP("N", ch),
            punct: testP("P", ch),
            symbol: testP("S", ch),
            mark: testP("M", ch),
            uppercase: testP("Uppercase", ch),
            lowercase: testP("Lowercase", ch),
            whitespace: isSpace,
            control: isControl,
            zeroWidth,
            combining,
            emoji: isEmoji,
            emojiPresentation: testP("Emoji_Presentation", ch),
            emojiModifier: testP("Emoji_Modifier", ch),
            emojiModifierBase: testP("Emoji_Modifier_Base", ch),
            pictographic: isPict,
            bidiControl: testP("Bidi_Control", ch),
            ascii: cp <= 0x7f,
            bmp: cp <= 0xffff,
            astral: cp > 0xffff,
            printable,
            dash: testP("Dash", ch),
            quotation: testP("Quotation_Mark", ch),
            hexDigit: testP("Hex_Digit", ch),
            diacritic: testP("Diacritic", ch),
            alphabetic: testP("Alphabetic", ch),
            math: testP("gc=Sm", ch),
          },
          upper: ch.toUpperCase(),
          lower: ch.toLowerCase(),
          numericValue: (() => {
            const v = "0123456789".includes(ch)
              ? Number(ch)
              : testP("Nd", ch)
                ? ch.charCodeAt(0)
                : null;
            return v;
          })(),
        };
      }

      /* ============================================================
   DOM + RENDER HELPERS
   ============================================================ */

      const $ = (s) => document.querySelector(s);
      const el = (t, c, h) => {
        const e = document.createElement(t);
        if (c) e.className = c;
        if (h != null) e.innerHTML = h;
        return e;
      };
      function escapeHtml(s) {
        return s
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");
      }

      const ICON_COPY =
        '<svg viewBox="0 0 16 16"><rect x="5" y="5" width="8.5" height="9.5" rx="1.6"/><path d="M3 10.5V3.6A1.6 1.6 0 0 1 4.6 2H10.5"/></svg>';
      const ICON_CHECK =
        '<svg viewBox="0 0 16 16"><path d="M3.5 8.6l3 3 6-7"/></svg>';

      function doCopy(text) {
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(text).catch(() => {});
        } else {
          const ta = el("textarea");
          ta.value = text;
          document.body.appendChild(ta);
          ta.select();
          try {
            document.execCommand("copy");
          } catch (e) {}
          ta.remove();
        }
      }
      function copyButton(text) {
        const btn = el("button", "copy-btn", ICON_COPY);
        btn.type = "button";
        btn.setAttribute("aria-label", "Copy value");
        btn.addEventListener("click", (e) => {
          e.stopPropagation();
          doCopy(text);
          btn.innerHTML = ICON_CHECK;
          btn.classList.add("copied");
          setTimeout(() => {
            btn.innerHTML = ICON_COPY;
            btn.classList.remove("copied");
          }, 1100);
        });
        return btn;
      }
      function attachTip(node, key) {
        if (key && key in TIPS) {
          node.classList.add("has-tip");
          node.dataset.tip = TIPS[key];
        }
      }

      // a labelled row inside the detail table (with copy + optional tooltip)
      function dataRow(label, valueHtml, copyVal) {
        const row = el("div", "detail-row");
        const lab = el("div", "field-label", label);
        attachTip(lab, label);
        const val = el("div", "field-value", valueHtml);
        const text = copyVal != null ? copyVal : val.textContent;
        val.appendChild(copyButton(text));
        row.append(lab, val);
        return row;
      }
      // a labelled row inside a string-level field list
      function kvRow(label, valueHtml, copyVal) {
        const row = el("div", "field-row");
        const lab = el("div", "field-label", label);
        attachTip(lab, label);
        const val = el("div", "field-value", valueHtml);
        const text = copyVal != null ? copyVal : val.textContent;
        val.appendChild(copyButton(text));
        row.append(lab, val);
        return row;
      }
      // a detail-table group with a tooltipped heading
      function group(title) {
        const g = el("div", "detail-group");
        const head = el("div", "group-title", title);
        g.appendChild(head);
        return g;
      }
      // a pill with an optional tooltip
      function pill(label, variant) {
        const p = el("span", "pill" + (variant ? " " + variant : ""), label);
        if (PILL_TIPS[label]) {
          p.classList.add("has-tip");
          p.dataset.tip = PILL_TIPS[label];
        }
        return p;
      }

      /* ============================================================
   STATE + MAIN RENDER
   ============================================================ */

      let graphemes = []; // array of {cluster, cps:[analysis...]}
      let selGrapheme = 0;
      let selCp = 0;

      const seg = typeof Intl !== "undefined" && Intl.Segmenter;

      function splitGraphemes(str) {
        if (seg) {
          const s = new Intl.Segmenter(undefined, { granularity: "grapheme" });
          return [...s.segment(str)].map((x) => x.segment);
        }
        return [...str]; // fallback: code points
      }

      function render() {
        const str = $("#input").value;
        const empty = str.length === 0;
        $("#emptyState").style.display = empty ? "block" : "none";
        ["#stats", "#graphemeSec", "#inspectSec", "#stringSec"].forEach((s) => {
          $(s).style.display = empty ? "none" : "";
        });
        if (empty) {
          $("#warn").className = "";
          $("#warn").innerHTML = "";
          return;
        }

        const clusters = splitGraphemes(str);
        graphemes = clusters.map((cluster) => ({
          cluster,
          cps: [...cluster].map((c) => analyzeCodepoint(c.codePointAt(0))),
        }));
        if (selGrapheme >= graphemes.length) selGrapheme = 0;

        renderWarnings(str);
        renderStats(str, clusters);
        renderStrip();
        renderInspector();
        renderStringLevel(str);
      }

      function renderWarnings(str) {
        const found = [];
        for (const g of graphemes)
          for (const a of g.cps) {
            if (a.flags.bidiControl) found.push(["bidi", a]);
            else if (a.flags.zeroWidth) found.push(["zw", a]);
            else if (
              a.flags.control &&
              a.cp !== 0x0a &&
              a.cp !== 0x09 &&
              a.cp !== 0x0d
            )
              found.push(["ctrl", a]);
            else if (a.cat === "Co") found.push(["priv", a]);
          }
        const w = $("#warn");
        if (!found.length) {
          w.className = "";
          w.innerHTML = "";
          return;
        }
        const types = {
          bidi: "bidirectional control characters (possible Trojan-Source / text-spoofing vector)",
          zw: "zero-width / invisible characters",
          ctrl: "control characters",
          priv: "private-use characters (renderer-dependent)",
        };
        const seen = new Set(found.map((f) => f[0]));
        const list = [...seen].map((k) => types[k]).join(", ");
        const detail = found
          .slice(0, 8)
          .map(([, a]) => "U+" + hex(a.cp, 4))
          .join(", ");
        w.className = "visible";
        w.innerHTML =
          '<div class="warning-banner"><span class="warning-icon">⚠</span><div>This string contains <b>' +
          found.length +
          "</b> hidden or non-printing character" +
          (found.length > 1 ? "s" : "") +
          " — " +
          list +
          '.<br><span style="color:var(--ink-dim);font-family:var(--mono);font-size:12px">' +
          detail +
          (found.length > 8 ? " …" : "") +
          "</span></div></div>";
      }

      function renderStats(str, clusters) {
        const cps = [...str];
        const utf8 = cps.reduce(
          (n, c) => n + utf8Bytes(c.codePointAt(0)).length,
          0,
        );
        const utf16 = str.length; // JS string length = UTF-16 code units
        let words;
        if (seg) {
          words = [
            ...new Intl.Segmenter(undefined, { granularity: "word" }).segment(
              str,
            ),
          ].filter((s) => s.isWordLike).length;
        } else {
          words = (str.trim().match(/\S+/g) || []).length;
        }
        const stats = [
          [
            clusters.length,
            "graphemes",
            "User-perceived characters. One emoji or accented letter counts as one, even when built from several code points.",
          ],
          [
            cps.length,
            "code points",
            "Distinct Unicode scalar values in the string — the count you get iterating with for…of or [...str].",
          ],
          [
            utf8,
            "UTF-8 bytes",
            "How many bytes the string occupies when stored/sent as UTF-8 (1–4 bytes per code point).",
          ],
          [
            utf16,
            "UTF-16 units",
            "16-bit code units — this is exactly JavaScript's string .length. Astral characters cost two.",
          ],
          [
            words,
            "words",
            "Word-like segments found by the Unicode word-segmentation algorithm.",
          ],
          [
            (str.match(/\n/g) || []).length + (str ? 1 : 0),
            "lines",
            "Number of lines (newline count + 1).",
          ],
        ];
        $("#stats").innerHTML = stats
          .map(
            ([n, k, tip]) =>
              '<div class="stat"><div class="stat-value">' +
              n +
              '</div><div class="stat-label"><span class="has-tip" data-tip="' +
              escapeHtml(tip) +
              '">' +
              k +
              "</span></div></div>",
          )
          .join("");
      }

      function displayGlyph(cluster, cps) {
        const first = cps[0];
        if (
          cps.length === 1 &&
          (first.flags.control ||
            first.flags.zeroWidth ||
            first.cp === 0x20 ||
            first.cp === 0xa0)
        ) {
          return {
            html:
              '<span class="nonprint-label">' + shortLabel(first) + "</span>",
            printable: false,
          };
        }
        return { html: escapeHtml(cluster), printable: true };
      }
      function shortLabel(a) {
        const map = {
          0x20: "SP",
          0xa0: "NBSP",
          0x09: "TAB",
          0x0a: "LF",
          0x0d: "CR",
          0x200b: "ZWSP",
          0x200c: "ZWNJ",
          0x200d: "ZWJ",
          0xfeff: "BOM",
          0x2060: "WJ",
          0xad: "SHY",
          0xfe0f: "VS16",
          0xfe0e: "VS15",
        };
        return map[a.cp] || (a.cat === "Cc" ? "CTRL" : "·");
      }

      function renderStrip() {
        const strip = $("#strip");
        strip.innerHTML = "";
        $("#graphemeHint").textContent =
          graphemes.length +
          " cluster" +
          (graphemes.length > 1 ? "s" : "") +
          " · click to inspect";
        graphemes.forEach((g, i) => {
          const cell = el(
            "div",
            "grapheme-cell" + (i === selGrapheme ? " selected" : ""),
          );
          const disp = displayGlyph(g.cluster, g.cps);
          cell.appendChild(el("div", "cell-index", i));
          if (g.cps.length > 1)
            cell.appendChild(el("div", "cell-badge", g.cps.length + "×"));
          cell.appendChild(el("div", "glyph", disp.html));
          cell.appendChild(
            el(
              "div",
              "cell-codepoint",
              g.cps.length === 1
                ? "U+" + hex(g.cps[0].cp, 4)
                : g.cps.length + " code points",
            ),
          );
          cell.addEventListener("click", () => {
            selGrapheme = i;
            selCp = 0;
            renderStrip();
            renderInspector();
            document
              .querySelector("#inspectSec")
              .scrollIntoView({ behavior: "smooth", block: "nearest" });
          });
          strip.appendChild(cell);
        });
      }

      function renderInspector() {
        const g = graphemes[selGrapheme];
        if (!g) return;
        if (selCp >= g.cps.length) selCp = 0;

        const disp = displayGlyph(g.cluster, g.cps);
        const bigInner = disp.printable
          ? escapeHtml(g.cluster)
          : '<div class="nonprint-note">' +
            escapeHtml(g.cps[0].name || g.cps[0].catName) +
            "<br>«non-printing»</div>";
        const utf8len = g.cps.reduce((n, a) => n + a.bytes.length, 0);
        const utf16len = g.cps.reduce((n, a) => n + a.units.length, 0);
        $("#specimen").innerHTML =
          '<div class="specimen-canvas">' +
          bigInner +
          "</div>" +
          '<div class="specimen-meta">' +
          '<div class="specimen-codepoint">' +
          g.cps.map((a) => "U+" + hex(a.cp, 4)).join(" ") +
          "</div>" +
          '<div class="specimen-name">' +
          (g.cps.length > 1
            ? "Grapheme cluster of " + g.cps.length + " code points"
            : escapeHtml(g.cps[0].name || g.cps[0].catName)) +
          "</div>" +
          '<div class="specimen-sub">' +
          g.cps.length +
          " code point" +
          (g.cps.length > 1 ? "s" : "") +
          " · " +
          utf8len +
          " UTF-8 bytes · " +
          utf16len +
          " UTF-16 units</div>" +
          "</div>" +
          clusterPills(g);
        $("#inspectHint").textContent =
          "grapheme " +
          selGrapheme +
          (g.cps.length > 1 ? " · " + g.cps.length + " code points" : "");

        const cpsel = $("#cpsel");
        cpsel.innerHTML = "";
        if (g.cps.length > 1) {
          g.cps.forEach((a, i) => {
            const t = el(
              "div",
              "codepoint-tab" + (i === selCp ? " selected" : ""),
              "U+" +
                hex(a.cp, 4) +
                ' <span class="tab-role">' +
                a.role +
                "</span>",
            );
            t.addEventListener("click", () => {
              selCp = i;
              renderInspector();
            });
            cpsel.appendChild(t);
          });
        }
        renderDetail(g.cps[selCp]);
      }

      function clusterPills(g) {
        const set = new Set();
        for (const a of g.cps) {
          if (a.flags.emoji) set.add("emoji");
          if (g.cps.some((x) => x.cp === 0x200d)) set.add("ZWJ sequence");
          if (a.flags.emojiModifier) set.add("skin tone");
          if (a.cp >= 0x1f1e6 && a.cp <= 0x1f1ff) set.add("flag");
          if (a.flags.combining) set.add("has combining mark");
          if (a.flags.astral) set.add("astral");
          if (a.flags.zeroWidth) set.add("invisible");
          if (a.flags.bidiControl) set.add("bidi control");
        }
        if (!set.size) return "";
        const variant = {
          "ZWJ sequence": "pill-violet",
          flag: "pill-violet",
          emoji: "pill-amber",
          "skin tone": "pill-amber",
        };
        return (
          '<div class="pill-row">' +
          [...set]
            .map((s) => {
              const cls =
                "pill " +
                (variant[s] || "pill-cyan") +
                (PILL_TIPS[s] ? " has-tip" : "");
              const tip = PILL_TIPS[s]
                ? ' data-tip="' + escapeHtml(PILL_TIPS[s]) + '"'
                : "";
              return '<span class="' + cls + '"' + tip + ">" + s + "</span>";
            })
            .join("") +
          "</div>"
        );
      }

      function renderDetail(a) {
        const d = $("#detail");
        d.innerHTML = "";
        const cp = a.cp;

        // ---- Identity ----
        const g1 = group("Identity");
        g1.appendChild(
          dataRow(
            "Character",
            a.flags.printable
              ? escapeHtml(a.ch)
              : '<span class="val-dim">' +
                  escapeHtml(a.name || a.catName) +
                  " (non-printing)</span>",
            a.ch,
          ),
        );
        if (a.name) g1.appendChild(dataRow("Name", escapeHtml(a.name)));
        g1.appendChild(
          dataRow(
            "Role in cluster",
            '<span class="val-cyan">' + a.role + "</span>",
            a.role,
          ),
        );
        g1.appendChild(
          dataRow(
            "Category",
            a.cat + ' <span class="val-dim">— ' + a.catName + "</span>",
            a.cat,
          ),
        );
        g1.appendChild(dataRow("Script", a.script));
        g1.appendChild(dataRow("Block", a.block));
        d.appendChild(g1);

        // ---- Code Point ----
        const g2 = group("Code Point");
        g2.appendChild(
          dataRow(
            "Unicode",
            '<span class="val-accent">U+' + hex(cp, 4) + "</span>",
            "U+" + hex(cp, 4),
          ),
        );
        g2.appendChild(
          dataRow(
            "Decimal",
            '<span class="val-accent">' + cp + "</span>",
            String(cp),
          ),
        );
        g2.appendChild(
          dataRow(
            "Hexadecimal",
            "0x" + hex(cp, cp > 0xffff ? 6 : 4),
            "0x" + hex(cp, cp > 0xffff ? 6 : 4),
          ),
        );
        g2.appendChild(dataRow("Octal", "0o" + oct(cp), "0o" + oct(cp)));
        g2.appendChild(
          dataRow(
            "Binary",
            '<span class="val-cyan">' +
              groupBits(bin(cp, cp > 0xffff ? 21 : cp > 0xff ? 16 : 8)) +
              "</span>",
            bin(cp, 8),
          ),
        );
        d.appendChild(g2);

        // ---- UTF-8 ----
        const g3 = group(
          "UTF-8 · " +
            a.bytes.length +
            " byte" +
            (a.bytes.length > 1 ? "s" : ""),
        );
        const grid = el("div", "byte-grid");
        a.bytes.forEach((b, i) => {
          const roleLbl =
            a.bytes.length === 1 ? "single" : i === 0 ? "lead" : "cont " + i;
          grid.appendChild(
            el(
              "div",
              "byte-cell",
              '<div class="byte-hex">' +
                hex(b, 2) +
                "</div>" +
                '<div class="byte-bin">' +
                binColored(b) +
                "</div>" +
                '<div class="byte-dec">' +
                b +
                "</div>" +
                '<div class="byte-label">' +
                roleLbl +
                "</div>",
            ),
          );
        });
        g3.appendChild(grid);
        g3.appendChild(
          el(
            "div",
            "byte-legend",
            '<span><span class="swatch marker"></span>structure bits</span><span><span class="swatch data"></span>code-point bits</span>',
          ),
        );
        g3.appendChild(
          dataRow("Hex bytes", a.bytes.map((b) => hex(b, 2)).join(" ")),
        );
        g3.appendChild(
          dataRow(
            "Escaped",
            a.bytes.map((b) => "\\x" + hex(b, 2).toLowerCase()).join(""),
          ),
        );
        d.appendChild(g3);

        // ---- UTF-16 & UTF-32 ----
        const g4 = group("UTF-16 & UTF-32");
        const surro = a.units.length > 1;
        g4.appendChild(
          dataRow(
            "UTF-16 units",
            a.units.map((u) => hex(u, 4)).join(" ") +
              (surro
                ? ' <span class="val-dim">(surrogate pair)</span>'
                : ' <span class="val-dim">(BMP, single unit)</span>'),
            a.units.map((u) => hex(u, 4)).join(" "),
          ),
        );
        if (surro) {
          g4.appendChild(dataRow("High surrogate", "0x" + hex(a.units[0], 4)));
          g4.appendChild(dataRow("Low surrogate", "0x" + hex(a.units[1], 4)));
        }
        g4.appendChild(
          dataRow(
            "UTF-16 bytes (BE)",
            a.units
              .map((u) => hex(u >> 8, 2) + " " + hex(u & 0xff, 2))
              .join(" "),
          ),
        );
        g4.appendChild(dataRow("UTF-32 (BE)", hex(cp, 8)));
        d.appendChild(g4);

        // ---- References & Escapes ----
        const g5 = group("References & Escapes");
        const ent = HTML_ENT[cp];
        g5.appendChild(
          dataRow("HTML (decimal)", "&amp;#" + cp + ";", "&#" + cp + ";"),
        );
        g5.appendChild(
          dataRow(
            "HTML (hex)",
            "&amp;#x" + hex(cp, cp > 0xffff ? 5 : 4) + ";",
            "&#x" + hex(cp, cp > 0xffff ? 5 : 4) + ";",
          ),
        );
        if (ent)
          g5.appendChild(
            dataRow("HTML (named)", "&amp;" + ent + ";", "&" + ent + ";"),
          );
        g5.appendChild(
          dataRow("CSS escape", "\\" + hex(cp, cp > 0xffff ? 6 : 4)),
        );
        const jsEsc =
          cp <= 0xffff
            ? "\\u" + hex(cp, 4)
            : a.units.map((u) => "\\u" + hex(u, 4)).join("");
        g5.appendChild(dataRow("JS escape (\\u)", jsEsc));
        g5.appendChild(dataRow("JS escape (ES6)", "\\u{" + hex(cp, 1) + "}"));
        g5.appendChild(
          dataRow(
            "Python escape",
            cp <= 0xffff ? "\\u" + hex(cp, 4) : "\\U" + hex(cp, 8),
          ),
        );
        g5.appendChild(
          dataRow(
            "URL (percent)",
            a.bytes.map((b) => "%" + hex(b, 2)).join(""),
          ),
        );
        g5.appendChild(dataRow("Base64 (UTF-8)", b64(a.bytes)));
        d.appendChild(g5);

        // ---- Case & Numeric ----
        const g6 = group("Case & Numeric");
        const caseVal = (form) =>
          escapeHtml(form) +
          ' <span class="val-dim">U+' +
          [...form].map((c) => hex(c.codePointAt(0), 4)).join(" U+") +
          (form === a.ch ? " · unchanged" : "") +
          "</span>";
        g6.appendChild(dataRow("Uppercase", caseVal(a.upper), a.upper));
        g6.appendChild(dataRow("Lowercase", caseVal(a.lower), a.lower));
        if (a.numericValue != null)
          g6.appendChild(dataRow("Numeric value", String(a.numericValue)));
        d.appendChild(g6);

        // ---- Properties ----
        const g7 = group("Properties");
        const F = a.flags;
        const props = [
          ["ASCII", F.ascii],
          ["Printable", F.printable],
          ["Letter", F.letter],
          ["Alphabetic", F.alphabetic],
          ["Number", F.number],
          ["Punctuation", F.punct],
          ["Symbol", F.symbol],
          ["Math", F.math],
          ["Mark / diacritic", F.mark || F.diacritic],
          ["Combining", F.combining],
          ["Whitespace", F.whitespace],
          ["Control", F.control],
          ["Zero-width", F.zeroWidth],
          ["Uppercase", F.uppercase],
          ["Lowercase", F.lowercase],
          ["Emoji", F.emoji],
          ["Emoji presentation", F.emojiPresentation],
          ["Emoji modifier", F.emojiModifier],
          ["Emoji base", F.emojiModifierBase],
          ["Pictographic", F.pictographic],
          ["Bidi control", F.bidiControl],
          ["Dash", F.dash],
          ["Quotation mark", F.quotation],
          ["Hex digit", F.hexDigit],
          ["BMP", F.bmp],
          ["Astral (>U+FFFF)", F.astral],
        ];
        const pw = el("div", "pill-row");
        pw.style.padding = "4px 16px 16px";
        props.forEach(([label, on]) => {
          if (on) pw.appendChild(pill(label, "pill-cyan"));
        });
        if (!pw.children.length)
          pw.appendChild(el("span", "pill", "no notable properties"));
        g7.appendChild(pw);
        d.appendChild(g7);
      }

      /* ============================================================
   STRING-LEVEL RENDER
   ============================================================ */

      function renderStringLevel(str) {
        const cps = [...str];
        const bytes = [];
        cps.forEach((c) =>
          utf8Bytes(c.codePointAt(0)).forEach((b) => bytes.push(b)),
        );

        $("#dumpLen").textContent = bytes.length + " bytes";
        $("#hexdump").innerHTML = hexDump(bytes);

        const kv = $("#strkv");
        kv.innerHTML = "";
        const rows = [
          [
            "Code points",
            cps.map((c) => "U+" + hex(c.codePointAt(0), 4)).join(" "),
          ],
          ["UTF-8 hex", bytes.map((b) => hex(b, 2)).join(" ")],
          ["UTF-8 Base64", b64(bytes)],
          [
            "UTF-16 units",
            cps
              .flatMap((c) => utf16Units(c.codePointAt(0)))
              .map((u) => hex(u, 4))
              .join(" "),
          ],
          ["URL-encoded", encodeURIComponent(str)],
          ["JS string literal", jsLiteral(str)],
          [
            "HTML entities",
            cps
              .map((c) => {
                const p = c.codePointAt(0);
                return HTML_ENT[p] ? "&" + HTML_ENT[p] + ";" : "&#" + p + ";";
              })
              .join(""),
          ],
          ["Binary (UTF-8)", bytes.map((b) => bin(b, 8)).join(" ")],
          ["Decimal bytes", bytes.join(" ")],
        ];
        // escapeHtml the display value (entities/literals show verbatim); copy the raw value
        rows.forEach(([k, v]) => kv.appendChild(kvRow(k, escapeHtml(v), v)));

        const forms = {
          NFC: str.normalize("NFC"),
          NFD: str.normalize("NFD"),
          NFKC: str.normalize("NFKC"),
          NFKD: str.normalize("NFKD"),
        };
        const allSame =
          forms.NFC === str &&
          forms.NFD === str &&
          forms.NFKC === str &&
          forms.NFKD === str;
        $("#normState").innerHTML = allSame
          ? '<span class="status-same">already normalized</span>'
          : '<span class="status-diff">forms differ</span>';
        const nkv = $("#normkv");
        nkv.innerHTML = "";
        Object.entries(forms).forEach(([name, val]) => {
          const same = val === str;
          nkv.appendChild(
            kvRow(
              name,
              (same
                ? '<span style="color:var(--ink-faint)">(unchanged) </span>'
                : "") +
                escapeHtml(val) +
                ' <span class="val-dim">— ' +
                [...val].length +
                " cp</span>",
              val,
            ),
          );
        });

        const skv = $("#segkv");
        skv.innerHTML = "";
        if (seg) {
          const words = [
            ...new Intl.Segmenter(undefined, { granularity: "word" }).segment(
              str,
            ),
          ];
          const sentences = [
            ...new Intl.Segmenter(undefined, {
              granularity: "sentence",
            }).segment(str),
          ];
          const wordLike = words.filter((w) => w.isWordLike);
          skv.appendChild(kvRow("Grapheme count", String(graphemes.length)));
          skv.appendChild(
            kvRow(
              "Word segments",
              wordLike.length + " word-like / " + words.length + " total",
            ),
          );
          skv.appendChild(kvRow("Sentences", String(sentences.length)));
          const wl = wordLike
            .map((w) => w.segment)
            .slice(0, 20)
            .join(" · ");
          if (wl)
            skv.appendChild(
              kvRow(
                "Words",
                escapeHtml(wl) + (wordLike.length > 20 ? " …" : ""),
                wordLike.map((w) => w.segment).join(" "),
              ),
            );
        } else {
          skv.appendChild(
            kvRow(
              "Segmentation",
              "Intl.Segmenter not available in this browser",
            ),
          );
        }
        const rev = graphemes
          .map((g) => g.cluster)
          .reverse()
          .join("");
        skv.appendChild(kvRow("Reversed (graphemes)", escapeHtml(rev), rev));
      }

      function jsLiteral(str) {
        let out = '"';
        for (const ch of str) {
          const cp = ch.codePointAt(0);
          if (ch === '"') out += '\\"';
          else if (ch === "\\") out += "\\\\";
          else if (cp === 0x0a) out += "\\n";
          else if (cp === 0x09) out += "\\t";
          else if (cp === 0x0d) out += "\\r";
          else if (cp < 0x20 || cp === 0x7f) out += "\\u" + hex(cp, 4);
          else if (cp > 0xffff) out += "\\u{" + hex(cp, 1) + "}";
          else if (cp > 0x7e) out += "\\u" + hex(cp, 4);
          else out += ch;
        }
        return out + '"';
      }

      function hexDump(bytes) {
        if (!bytes.length) return '<span class="dump-dim">(empty)</span>';
        let out = "";
        for (let i = 0; i < bytes.length; i += 16) {
          const slice = bytes.slice(i, i + 16);
          const off = '<span class="dump-dim">' + hex(i, 8) + "</span>";
          let h = "";
          for (let j = 0; j < 16; j++) {
            h += j < slice.length ? hex(slice[j], 2) + " " : "   ";
            if (j === 7) h += " ";
          }
          let asc = "";
          for (const b of slice) {
            asc +=
              b >= 0x20 && b < 0x7f
                ? escapeHtml(String.fromCharCode(b))
                : '<span class="dump-dim">.</span>';
          }
          out +=
            off +
            "  " +
            h.trimEnd() +
            '  <span class="dump-ascii">' +
            asc +
            "</span>\n";
        }
        return out.trimEnd();
      }

      /* ============================================================
   WIRING
   ============================================================ */

      $("#input").addEventListener("input", render);
      $("#clearbtn").addEventListener("click", () => {
        $("#input").value = "";
        selGrapheme = 0;
        selCp = 0;
        render();
        $("#input").focus();
      });
      document.querySelectorAll(".sample-chip[data-sample]").forEach((b) => {
        b.addEventListener("click", () => {
          // decode any HTML entity in the sample (for the zero-width / bidi ones)
          const tmp = el("textarea");
          tmp.innerHTML = b.dataset.sample;
          $("#input").value = tmp.value;
          selGrapheme = 0;
          selCp = 0;
          render();
          $("#input").focus();
        });
      });

      /* ---- info tooltip engine (event-delegated, escapes clipping containers) ---- */
      (function () {
        const tt = $("#tooltip");
        let cur = null;
        function place(target) {
          tt.textContent = target.dataset.tip;
          tt.classList.remove("tooltip-below");
          tt.style.left = "-9999px";
          tt.style.top = "0";
          tt.classList.add("visible"); // measure
          const tr = target.getBoundingClientRect();
          const tw = tt.offsetWidth,
            th = tt.offsetHeight,
            m = 8;
          let left = tr.left + tr.width / 2 - tw / 2;
          left = Math.max(m, Math.min(left, window.innerWidth - tw - m));
          let top = tr.top - th - 10;
          let below = false;
          if (top < m) {
            top = tr.bottom + 10;
            below = true;
          }
          tt.classList.toggle("tooltip-below", below);
          const arrowX = Math.max(
            12,
            Math.min(tw - 12, tr.left + tr.width / 2 - left),
          );
          tt.style.setProperty("--arrow-x", arrowX - 4 + "px");
          tt.style.left = left + "px";
          tt.style.top = top + "px";
        }
        document.addEventListener("mouseover", (e) => {
          const t = e.target.closest && e.target.closest("[data-tip]");
          if (t && t !== cur) {
            cur = t;
            place(t);
          }
        });
        document.addEventListener("mouseout", (e) => {
          const t = e.target.closest && e.target.closest("[data-tip]");
          if (t && t === cur) {
            cur = null;
            tt.classList.remove("visible");
          }
        });
        window.addEventListener(
          "scroll",
          () => {
            if (cur) place(cur);
          },
          true,
        );
      })();

      // initial demo
      $("#input").value = "👋";
      render();
    </script>
  </body>
</html>
