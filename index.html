        g7.appendChild(pw);
        d.appendChild(g7);
      }

      /* ============================================================
   STRING-LEVEL RENDER
   ============================================================ */

      function renderStringLevel(str, wordSegs) {
        const cps = [...str];
        const bytes = [];
        cps.forEach((c) =>
          utf8Bytes(c.codePointAt(0)).forEach((b) => bytes.push(b)),
        );

        // byte index -> grapheme index, for marking the selected grapheme
        // (skipped on very large inputs to keep the dump's HTML lean)
        let owners = null;
        if (bytes.length <= 4096) {
          owners = [];
          graphemes.forEach((g, gi) => {
            for (const a of g.cps)
              for (let k = 0; k < a.bytes.length; k++) owners.push(gi);
          });
        }

        $("#dumpLen").textContent = bytes.length + " bytes";
        _dumpBytes = bytes;
        _dumpOwners = owners;
        $("#hexdump").innerHTML = hexDump(bytes, pickHexPerRow(), owners);

        const kv = $("#strkv");
        kv.innerHTML = "";
        const rows = [
          [
            "Code points",
            cps.map((c) => "U+" + hex(c.codePointAt(0), 4)).join(" "),
          ],
          ["UTF-8 hex", bytes.map((b) => hex(b, 2)).join(" ")],
          ["UTF-8 Base64", b64(bytes)],
          [
            "UTF-16 units",
            cps
              .flatMap((c) => utf16Units(c.codePointAt(0)))
              .map((u) => hex(u, 4))
              .join(" "),
          ],
          ["URL-encoded", encodeURIComponent(str)],
          ["JS string literal", jsLiteral(str)],
          [
            "HTML entities",
            cps
              .map((c) => {
                const p = c.codePointAt(0);
                return HTML_ENT[p] ? "&" + HTML_ENT[p] + ";" : "&#" + p + ";";
              })
              .join(""),
          ],
          ["Binary (UTF-8)", bytes.map((b) => bin(b, 8)).join(" ")],
          ["Decimal bytes", bytes.join(" ")],
        ];
        // escapeHtml the display value (entities/literals show verbatim); copy the raw value
        rows.forEach(([k, v]) => kv.appendChild(kvRow(k, escapeHtml(v), v)));

        const forms = {
          NFC: str.normalize("NFC"),
          NFD: str.normalize("NFD"),
          NFKC: str.normalize("NFKC"),
          NFKD: str.normalize("NFKD"),
        };
        const allSame =
          forms.NFC === str &&
          forms.NFD === str &&
          forms.NFKC === str &&
          forms.NFKD === str;
        $("#normState").innerHTML = allSame
          ? '<span class="status-same">already normalized</span>'
          : '<span class="status-diff">forms differ</span>';
        const nkv = $("#normkv");
        nkv.innerHTML = "";
        Object.entries(forms).forEach(([name, val]) => {
          const same = val === str;
          nkv.appendChild(
            kvRow(
              name,
              (same
                ? '<span style="color:var(--ink-faint)">(unchanged) </span>'
                : "") +
                escapeHtml(val) +
                ' <span class="val-dim">— ' +
                [...val].length +
                " cp</span>",
              val,
            ),
          );
        });

        const skv = $("#segkv");
        skv.innerHTML = "";
        if (seg) {
          const words = wordSegs;
          const sentences = [
            ...new Intl.Segmenter(undefined, {
              granularity: "sentence",
            }).segment(str),
          ];
          const wordLike = words.filter((w) => w.isWordLike);
          skv.appendChild(kvRow("Grapheme count", String(graphemes.length)));
          skv.appendChild(
            kvRow(
              "Word segments",
              wordLike.length + " word-like / " + words.length + " total",
            ),
          );
          skv.appendChild(kvRow("Sentences", String(sentences.length)));
          const wl = wordLike
            .map((w) => w.segment)
            .slice(0, 20)
            .join(" · ");
          if (wl)
            skv.appendChild(
              kvRow(
                "Words",
                escapeHtml(wl) + (wordLike.length > 20 ? " …" : ""),
                wordLike.map((w) => w.segment).join(" "),
              ),
            );
        } else {
          skv.appendChild(
            kvRow(
              "Segmentation",
              "Intl.Segmenter not available in this browser",
            ),
          );
        }
        const rev = graphemes
          .map((g) => g.cluster)
          .reverse()
          .join("");
        skv.appendChild(kvRow("Reversed (graphemes)", escapeHtml(rev), rev));

        syncDumpSelection();
      }

      // persistently mark the selected grapheme's bytes in the hex dump, so
      // the selection is findable there without hovering across the page
      function syncDumpSelection() {
        document
          .querySelectorAll("#hexdump .sel")
          .forEach((n) => n.classList.remove("sel"));
        document
          .querySelectorAll('#hexdump [data-gi="' + selGrapheme + '"]')
          .forEach((n) => n.classList.add("sel"));
      }

      function jsLiteral(str) {
        let out = '"';
        for (const ch of str) {
          const cp = ch.codePointAt(0);
          if (ch === '"') out += '\\"';
          else if (ch === "\\") out += "\\\\";
          else if (cp === 0x0a) out += "\\n";
          else if (cp === 0x09) out += "\\t";
          else if (cp === 0x0d) out += "\\r";
          else if (cp < 0x20 || cp === 0x7f) out += "\\u" + hex(cp, 4);
          else if (cp > 0xffff) out += "\\u{" + hex(cp, 1) + "}";
          else if (cp > 0x7e) out += "\\u" + hex(cp, 4);
          else out += ch;
        }
        return out + '"';
      }

      // widest number of bytes per row (16 / 8 / 4) that fits the panel
      // without overflowing — keeps the dump aligned instead of scrolling
      function pickHexPerRow() {
        const host = $("#hexdump");
        if (!host) return 16;
        const cs = getComputedStyle(host);
        const avail =
          host.clientWidth -
          parseFloat(cs.paddingLeft) -
          parseFloat(cs.paddingRight);
        if (!avail) return 16;
        const probe = document.createElement("span");
        probe.style.cssText =
          "position:absolute;visibility:hidden;white-space:pre;font-family:" +
          cs.fontFamily +
          ";font-size:" +
          cs.fontSize;
        probe.textContent = "0".repeat(100);
        host.appendChild(probe);
        const charW = probe.getBoundingClientRect().width / 100;
        probe.remove();
        // per row: offset(8) + "  " + n*3-1 hex chars (+1 mid-gap if n>8) + "  " + n ascii
        const rowW = (n) =>
          (8 + 2 + (n * 3 - 1) + (n > 8 ? 1 : 0) + 2 + n) * charW;
        for (const n of [16, 8, 4]) if (rowW(n) <= avail) return n;
        return 4;
      }
      // owners (optional) maps byte index -> grapheme index; when present each
      // byte is wrapped in a data-gi span so the selected grapheme can be marked
      function hexDump(bytes, perRow, owners) {
        if (!bytes.length) return '<span class="dump-dim">(empty)</span>';
        const n = perRow || 16;
        const gap = n > 8 ? n / 2 - 1 : -1; // index after which to add a mid-gap
        let out = "";
        for (let i = 0; i < bytes.length; i += n) {
          const slice = bytes.slice(i, i + n);
          const off = '<span class="dump-dim">' + hex(i, 8) + "</span>";
          let h = "";
          for (let j = 0; j < n; j++) {
            if (j < slice.length) {
              const hx = hex(slice[j], 2);
              h += owners
                ? '<span class="dump-byte" data-gi="' +
                  owners[i + j] +
                  '">' +
                  hx +
                  "</span> "
                : hx + " ";
            } else {
              h += "   "; // keep padding so the ASCII column stays aligned
            }
            if (j === gap) h += " ";
          }
          let asc = "";
          slice.forEach((b, j) => {
            const printable = b >= 0x20 && b < 0x7f;
            const inner = printable ? escapeHtml(String.fromCharCode(b)) : ".";
            asc += owners
              ? '<span class="dump-asc' +
                (printable ? "" : " dump-dim") +
                '" data-gi="' +
                owners[i + j] +
                '">' +
                inner +
                "</span>"
              : printable
                ? inner
                : '<span class="dump-dim">.</span>';
          });
          out +=
            off + "  " + h + ' <span class="dump-ascii">' + asc + "</span>\n";
        }
        return out.trimEnd();
      }

      /* ============================================================
   WIRING
   ============================================================ */

      /* ---- persistence: mirror the input to the URL hash + localStorage ---- */
      const STORE_KEY = "text-tool:input";
      let _hashTimer = null;
      function persist(str) {
        try {
          localStorage.setItem(STORE_KEY, str);
        } catch (e) {}
        // debounced so rapid typing doesn't hit browser replaceState rate limits;
        // replaceState (not location.hash) avoids spamming the back-button history
        clearTimeout(_hashTimer);
        _hashTimer = setTimeout(() => {
          try {
            const url = str
              ? "#" + encodeURIComponent(str)
              : location.pathname + location.search;
            history.replaceState(null, "", url);
          } catch (e) {}
        }, 120);
      }
      function readHash() {
        if (location.hash.length <= 1) return null;
        const raw = location.hash.slice(1);
        try {
          return decodeURIComponent(raw);
        } catch (e) {
          return raw;
        }
      }

      $("#input").addEventListener("input", () => {
        render();
        persist($("#input").value);
      });
      // reflow the hex dump (bytes-per-row) when the panel width changes
      let _dumpResizeTimer = null;
      window.addEventListener("resize", () => {
        clearTimeout(_dumpResizeTimer);
        _dumpResizeTimer = setTimeout(() => {
          if (_dumpBytes.length) {
            $("#hexdump").innerHTML = hexDump(
              _dumpBytes,
              pickHexPerRow(),
              _dumpOwners,
            );
            syncDumpSelection();
          }
        }, 120);
      });
      const moreChips = $("#moreChips");
      moreChips.textContent =
        "+" + document.querySelectorAll(".sample-chip.extra").length + " more";
      moreChips.addEventListener("click", () => {
        moreChips.closest(".toolbar").classList.add("expanded");
        moreChips.remove();
      });
      document.querySelectorAll(".sample-chip[data-sample]").forEach((b) => {
        b.addEventListener("click", () => {
          // decode any HTML entity in the sample (for the zero-width / bidi ones)
          const tmp = el("textarea");
          tmp.innerHTML = b.dataset.sample;
          $("#input").value = tmp.value;
          selGrapheme = 0;
          selCp = 0;
          render();
          persist(tmp.value);
          $("#input").focus();
        });
      });
      // keep in sync with back/forward navigation and shared #-links
      // (a removed hash means "empty input", so the field clears too)
      window.addEventListener("hashchange", () => {
        const h = readHash() ?? "";
        if (h !== $("#input").value) {
          $("#input").value = h;
          selGrapheme = 0;
          selCp = 0;
          render();
          try {
            localStorage.setItem(STORE_KEY, h);
          } catch (e) {}
        }
      });

      /* ---- share: flush the hash immediately, then copy the URL ---- */
      $("#sharebtn").addEventListener("click", () => {
        const str = $("#input").value;
        clearTimeout(_hashTimer);
        try {
          history.replaceState(
            null,
            "",
            str
              ? "#" + encodeURIComponent(str)
              : location.pathname + location.search,
          );
        } catch (e) {}
        doCopy(location.href);
        showToast("Link copied to clipboard");
      });

      /* ---- keyboard navigation: strip (←/→/Home/End) & code-point tabs ---- */
      $("#strip").addEventListener("keydown", (e) => {
        if (!graphemes.length) return;
        let i = selGrapheme;
        if (e.key === "ArrowRight") i++;
        else if (e.key === "ArrowLeft") i--;
        else if (e.key === "Home") i = 0;
        else if (e.key === "End") i = graphemes.length - 1;
        else return;
        e.preventDefault();
        selGrapheme = Math.max(0, Math.min(graphemes.length - 1, i));
        selCp = 0;
        renderStrip();
        renderInspector();
        const c = $("#strip").querySelector('[data-gi="' + selGrapheme + '"]');
        if (c) c.focus();
      });
      $("#cpsel").addEventListener("keydown", (e) => {
        const g = graphemes[selGrapheme];
        if (!g || g.cps.length < 2) return;
        let i = selCp;
        if (e.key === "ArrowRight" || e.key === "ArrowDown") i++;
        else if (e.key === "ArrowLeft" || e.key === "ArrowUp") i--;
        else return;
        e.preventDefault();
        selCp = (i + g.cps.length) % g.cps.length;
        renderInspector();
        const t = $("#cpsel").children[selCp];
        if (t) t.focus();
      });

      /* ---- info tooltip engine (event-delegated, escapes clipping containers) ---- */
      (function () {
        const tt = $("#tooltip");
        let cur = null;
        function place(target) {
          tt.textContent = target.dataset.tip;
          tt.classList.remove("tooltip-below");
          tt.style.left = "-9999px";
          tt.style.top = "0";
          tt.classList.add("visible"); // measure
          const tr = target.getBoundingClientRect();
          const tw = tt.offsetWidth,
            th = tt.offsetHeight,
            m = 8;
          let left = tr.left + tr.width / 2 - tw / 2;
          left = Math.max(m, Math.min(left, window.innerWidth - tw - m));
          let top = tr.top - th - 10;
          let below = false;
          if (top < m) {
            top = tr.bottom + 10;
            below = true;
          }
          tt.classList.toggle("tooltip-below", below);
          const arrowX = Math.max(
            12,
            Math.min(tw - 12, tr.left + tr.width / 2 - left),
          );
          tt.style.setProperty("--arrow-x", arrowX - 4 + "px");
          tt.style.left = left + "px";
          tt.style.top = top + "px";
        }
        document.addEventListener("mouseover", (e) => {
          const t = e.target.closest && e.target.closest("[data-tip]");
          if (t && t !== cur) {
            cur = t;
            place(t);
          }
        });
        document.addEventListener("mouseout", (e) => {
          const t = e.target.closest && e.target.closest("[data-tip]");
          if (t && t === cur) {
            cur = null;
            tt.classList.remove("visible");
          }
        });
        // touch devices get no mouseover — tap a tipped element to toggle it
        document.addEventListener("click", (e) => {
          if (!window.matchMedia("(hover: none)").matches) return;
          const t = e.target.closest && e.target.closest("[data-tip]");
          if (t) {
            if (cur === t) {
              cur = null;
              tt.classList.remove("visible");
            } else {
              cur = t;
              place(t);
            }
          } else if (cur) {
            cur = null;
            tt.classList.remove("visible");
          }
        });
        window.addEventListener(
          "scroll",
          () => {
            if (cur) place(cur);
          },
          true,
        );
      })();

      // restore prior input: URL hash first (shareable links), then
      // localStorage, falling back to the demo only on a first-ever visit
      (function () {
        let init = readHash();
        let restored = init != null;
        if (init == null) {
          try {
            const saved = localStorage.getItem(STORE_KEY);
            if (saved != null) {
              init = saved;
              restored = true;
            }
          } catch (e) {}
        }
        if (init == null) init = "👋"; // first visit demo
        $("#input").value = init;
        render();
        // sync hash + storage for restored content, but leave the demo's URL clean
        if (restored) persist(init);
      })();
    </script>
  </body>
</html>
