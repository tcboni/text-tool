<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Text Tool</title>
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%2044%2044'%3E%3Crect%20x='2'%20y='2'%20width='40'%20height='40'%20rx='9'%20fill='%23131519'%20stroke='%232c2e33'/%3E%3Crect%20x='7'%20y='7'%20width='30'%20height='30'%20rx='4'%20fill='none'%20stroke='%23ffb454'%20stroke-opacity='.28'%20stroke-dasharray='3%203'/%3E%3Cpath%20d='M16.75%2017%20H27.25%20M22%2017%20V28'%20fill='none'%20stroke='%23ffb454'%20stroke-width='3'%20stroke-linecap='round'/%3E%3C/svg%3E"
    />
    <style>
      /* ============================================================
     TEXT TOOL — a character/string dissection instrument.
     Aesthetic: "laboratory oscilloscope" — near-black canvas,
     hairline grid, warm amber signal color, cool cyan for meta.
     ============================================================ */

      :root {
        --bg: #0c0d0f;
        --bg-grid: rgba(255, 255, 255, 0.02);
        --panel: #131519;
        --panel-2: #16191e;
        --line: rgba(255, 255, 255, 0.075);
        --line-soft: rgba(255, 255, 255, 0.045);
        --ink: #e9e6df; /* warm off-white */
        --ink-dim: #9aa0a8;
        --ink-faint: #61666e;
        --amber: #ffb454; /* primary signal */
        --amber-dim: #b9823a;
        --cyan: #5fc9d6; /* secondary / meta */
        --cyan-dim: #3f7d87; /* muted cyan — UTF-8 structure bits */
        --violet: #a99bf0; /* rare tertiary for flags */
        --rose: #f0768b; /* warnings */
        --green: #93d07f;
        --mono:
          ui-monospace, "SF Mono", "SFMono-Regular", Menlo, Consolas,
          "Liberation Mono", monospace;
        --sans:
          "Inter", ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto,
          sans-serif;
        --radius: 10px;
      }

      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
      }
      body {
        background:
          linear-gradient(var(--bg-grid) 1px, transparent 1px) 0 0 / 100% 26px,
          linear-gradient(90deg, var(--bg-grid) 1px, transparent 1px) 0 0 / 26px
            100%,
          radial-gradient(
            1200px 600px at 78% -10%,
            rgba(255, 180, 84, 0.05),
            transparent 60%
          ),
          var(--bg);
        color: var(--ink);
        font-family: var(--sans);
        font-size: 15px;
        line-height: 1.5;
        -webkit-font-smoothing: antialiased;
        min-height: 100vh;
      }

      .page {
        max-width: 1120px;
        margin: 0 auto;
        padding: 34px 26px 90px;
      }

      /* ---------- header ---------- */
      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 24px;
        flex-wrap: wrap;
        margin-bottom: 18px;
      }
      .brand {
        display: flex;
        align-items: center;
        gap: 15px;
      }
      .logo {
        width: 44px;
        height: 44px;
        flex: 0 0 auto;
        display: block;
      }
      .logo svg {
        width: 44px;
        height: 44px;
        display: block;
      }
      .logo-frame {
        fill: var(--panel);
        stroke: var(--line);
        stroke-width: 1;
      }
      .logo-dash {
        fill: none;
        stroke: rgba(255, 180, 84, 0.28);
        stroke-width: 1;
        stroke-dasharray: 3 3;
      }
      .logo-t {
        fill: none;
        stroke: var(--amber);
        stroke-width: 3;
        stroke-linecap: round;
      }
      h1 {
        font-size: 20px;
        margin: 0;
        letter-spacing: 0.02em;
        font-weight: 650;
      }
      .header-actions {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .share-btn {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        height: 33px;
        padding: 0 13px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        color: var(--ink-dim);
        font-family: var(--sans);
        font-size: 13px;
        cursor: pointer;
        transition: 0.14s;
      }
      .share-btn svg {
        width: 13px;
        height: 13px;
        fill: none;
        stroke: currentColor;
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .share-btn:hover {
        color: var(--amber);
        border-color: rgba(255, 180, 84, 0.45);
        background: #1b1f25;
        transform: translateY(-1px);
      }
      .github-link {
        display: grid;
        place-items: center;
        width: 40px;
        height: 40px;
        border: 1px solid var(--line);
        border-radius: 9px;
        background: var(--panel);
        color: var(--ink-dim);
        transition: 0.14s;
      }
      .github-link:hover {
        color: var(--amber);
        border-color: rgba(255, 180, 84, 0.45);
        background: #1b1f25;
        transform: translateY(-1px);
      }
      .github-link svg {
        width: 20px;
        height: 20px;
      }

      /* ---------- input ---------- */
      .input-card {
        position: relative;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: var(--panel);
        overflow: hidden;
      }
      .accent-rail {
        position: absolute;
        left: 0;
        top: 0;
        bottom: 0;
        width: 3px;
        background: linear-gradient(var(--amber), var(--amber-dim));
        opacity: 0.75;
      }
      .input-card label {
        display: block;
        font-family: var(--mono);
        font-size: 11px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--ink-faint);
        padding: 12px 16px 0 20px;
      }
      #input {
        width: 100%;
        min-height: 104px;
        resize: vertical;
        border: 0;
        outline: 0;
        background: transparent;
        color: var(--ink);
        font-family: var(--mono);
        font-size: 22px;
        line-height: 1.45;
        padding: 10px 16px 16px 20px;
      }
      #input::placeholder {
        color: var(--ink-faint);
      }
      .toolbar {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        padding: 10px 16px 12px 20px;
        border-top: 1px solid var(--line-soft);
        align-items: center;
      }
      .sample-chip {
        font-family: var(--mono);
        font-size: 12px;
        color: var(--ink-dim);
        background: var(--panel-2);
        border: 1px solid var(--line);
        padding: 5px 10px;
        border-radius: 7px;
        cursor: pointer;
        transition: 0.12s;
      }
      .sample-chip:hover {
        color: var(--ink);
        border-color: rgba(255, 180, 84, 0.4);
        background: #1b1f25;
      }
      .sample-chip.subtle {
        color: var(--ink-faint);
      }
      /* extra chips hide until the "+N more" expander is clicked */
      .toolbar:not(.expanded) .sample-chip.extra {
        display: none;
      }
      .toolbar-label {
        font-family: var(--mono);
        font-size: 10px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--ink-faint);
        margin-right: 4px;
      }

      /* ---------- warning banner ---------- */
      #warn {
        margin-top: 16px;
        display: none;
      }
      #warn.visible {
        display: block;
      }
      .warning-banner {
        border: 1px solid rgba(240, 118, 139, 0.35);
        background: rgba(240, 118, 139, 0.07);
        border-radius: var(--radius);
        padding: 12px 16px;
        font-size: 13.5px;
        color: #f4b3bd;
        display: flex;
        gap: 12px;
        align-items: flex-start;
      }
      .warning-icon {
        color: var(--rose);
        font-family: var(--mono);
        font-weight: 700;
      }
      .warning-banner b {
        color: #ffd7de;
      }

      /* ---------- stats ---------- */
      .stats {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
        gap: 1px;
        background: var(--line);
        border: 1px solid var(--line);
        border-radius: var(--radius);
        overflow: hidden;
        margin-top: 16px;
      }
      .stat {
        background: var(--panel);
        padding: 14px 16px;
      }
      .stat-value {
        font-family: var(--mono);
        font-size: 25px;
        font-weight: 600;
        color: var(--amber);
        line-height: 1;
      }
      .stat-label {
        font-size: 11px;
        letter-spacing: 0.09em;
        text-transform: uppercase;
        color: var(--ink-faint);
        margin-top: 7px;
      }

      /* ---------- section scaffolding ---------- */
      section {
        scroll-margin: 30px;
        margin-top: 30px;
      }
      .section-header {
        display: flex;
        align-items: baseline;
        gap: 12px;
        margin-bottom: 14px;
      }
      .section-header h2 {
        font-size: 13px;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: var(--ink-dim);
        margin: 0;
        font-weight: 600;
      }
      .section-divider {
        flex: 1;
        height: 1px;
        background: var(--line-soft);
      }
      .section-hint {
        font-family: var(--mono);
        font-size: 11px;
        color: var(--ink-faint);
      }

      /* ---------- grapheme strip ---------- */
      .grapheme-strip {
        display: flex;
        flex-wrap: wrap;
        gap: 9px;
      }
      .grapheme-cell {
        position: relative;
        min-width: 58px;
        border: 1px solid var(--line);
        border-radius: 9px;
        background: var(--panel);
        padding: 10px 8px 8px;
        cursor: pointer;
        transition: 0.12s;
        text-align: center;
      }
      .grapheme-cell:hover {
        border-color: rgba(255, 180, 84, 0.5);
        background: #1a1e24;
        transform: translateY(-1px);
      }
      .grapheme-cell.selected {
        border-color: var(--amber);
        background: #1d2026;
        box-shadow:
          0 0 0 1px var(--amber) inset,
          0 6px 20px rgba(0, 0, 0, 0.4);
      }
      .grapheme-cell .glyph {
        font-family: var(--sans);
        font-size: 30px;
        line-height: 1.15;
        min-height: 38px;
        color: var(--ink);
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .cell-index {
        position: absolute;
        top: 4px;
        left: 6px;
        font-family: var(--mono);
        font-size: 9.5px;
        color: var(--ink-faint);
      }
      .cell-codepoint {
        font-family: var(--mono);
        font-size: 10px;
        color: var(--ink-faint);
        margin-top: 5px;
      }
      .cell-badge {
        position: absolute;
        top: 4px;
        right: 5px;
        font-family: var(--mono);
        font-size: 9px;
        color: var(--cyan);
        background: rgba(95, 201, 214, 0.1);
        border-radius: 4px;
        padding: 1px 4px;
      }
      .nonprint-label {
        font-family: var(--mono);
        font-size: 12px;
        color: var(--rose);
      }

      /* ---------- inspector ---------- */
      .inspector-grid {
        display: grid;
        grid-template-columns: 260px 1fr;
        gap: 18px;
      }
      @media (max-width: 820px) {
        .inspector-grid {
          grid-template-columns: 1fr;
        }
      }

      .specimen {
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: var(--panel);
        overflow: hidden;
        align-self: start;
      }
      /* only stick in the two-column layout; static once stacked so it can't overlap */
      @media (min-width: 821px) {
        .specimen {
          position: sticky;
          top: 16px;
        }
      }
      .specimen-canvas {
        height: 190px;
        display: grid;
        place-items: center;
        font-size: 96px;
        color: var(--ink);
        background:
          linear-gradient(var(--line-soft) 1px, transparent 1px) 0 0/100% 19px,
          linear-gradient(90deg, var(--line-soft) 1px, transparent 1px) 0 0/19px
            100%,
          #101216;
        border-bottom: 1px solid var(--line);
        position: relative;
        word-break: break-all;
        text-align: center;
        padding: 8px;
      }
      .nonprint-note {
        font-family: var(--mono);
        font-size: 15px;
        color: var(--rose);
        text-align: center;
        line-height: 1.5;
      }
      .specimen-meta {
        padding: 14px 16px;
      }
      .specimen-codepoint {
        font-family: var(--mono);
        font-size: 20px;
        color: var(--amber);
      }
      .specimen-name {
        font-size: 13px;
        color: var(--ink);
        margin-top: 6px;
        line-height: 1.4;
      }
      .specimen-sub {
        font-family: var(--mono);
        font-size: 11.5px;
        color: var(--ink-faint);
        margin-top: 8px;
      }

      .pill-row {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        padding: 0 16px 16px;
      }
      .pill {
        font-family: var(--mono);
        font-size: 10.5px;
        padding: 3px 8px;
        border-radius: 20px;
        border: 1px solid var(--line);
        color: var(--ink-dim);
      }
      .pill.pill-cyan {
        color: #101216;
        background: var(--cyan);
        border-color: var(--cyan);
        font-weight: 600;
      }
      .pill.pill-amber {
        color: #101216;
        background: var(--amber);
        border-color: var(--amber);
        font-weight: 600;
      }
      .pill.pill-violet {
        color: #101216;
        background: var(--violet);
        border-color: var(--violet);
        font-weight: 600;
      }

      /* per-platform emoji renderings */
      .emoji-variants {
        border-top: 1px solid var(--line);
        padding: 14px 16px 16px;
      }
      .emoji-variants:empty {
        display: none;
      }
      .emoji-variants-head {
        font-family: var(--mono);
        font-size: 10.5px;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--ink-faint);
        margin-bottom: 12px;
      }
      .emoji-variant-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(64px, 1fr));
        gap: 10px;
      }
      .emoji-variant {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 6px;
        text-align: center;
      }
      .emoji-variant img {
        width: 44px;
        height: 44px;
        image-rendering: auto;
      }
      .emoji-variant-name {
        font-family: var(--mono);
        font-size: 10px;
        color: var(--ink-dim);
        line-height: 1.2;
      }
      .emoji-variant-sub {
        font-family: var(--mono);
        font-size: 9px;
        color: var(--ink-faint);
        line-height: 1.2;
      }

      /* code-point selector for multi-codepoint clusters */
      .codepoint-tabs {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
        margin-bottom: 14px;
      }
      .codepoint-tabs:empty {
        display: none;
        margin: 0;
      }
      .codepoint-tab {
        font-family: var(--mono);
        font-size: 11.5px;
        color: var(--ink-dim);
        background: var(--panel-2);
        border: 1px solid var(--line);
        padding: 6px 10px;
        border-radius: 7px;
        cursor: pointer;
        display: flex;
        gap: 7px;
        align-items: center;
      }
      .codepoint-tab:hover {
        border-color: rgba(255, 180, 84, 0.4);
        color: var(--ink);
      }
      .codepoint-tab.selected {
        border-color: var(--amber);
        color: var(--amber);
      }
      .tab-role {
        color: var(--ink-faint);
        font-size: 10px;
      }
      .codepoint-tab.selected .tab-role {
        color: var(--amber-dim);
      }

      /* ---------- detail table ---------- */
      .detail-table {
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: var(--panel);
        overflow: hidden;
      }
      .detail-group {
        border-top: 1px solid var(--line-soft);
      }
      .detail-group:first-child {
        border-top: 0;
      }
      .group-title {
        font-family: var(--mono);
        font-size: 10.5px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--amber-dim);
        padding: 10px 16px 4px;
      }
      .detail-row {
        display: grid;
        grid-template-columns: 170px 1fr;
        gap: 14px;
        padding: 6px 16px;
        align-items: baseline;
        transition: background 0.1s;
      }
      .detail-row:hover {
        background: #181c21;
      }
      .detail-row .field-label {
        font-size: 12px;
        color: var(--ink-dim);
      }
      .detail-row .field-value {
        font-family: var(--mono);
        font-size: 13px;
        color: var(--ink);
        word-break: break-all;
      }
      .val-accent {
        color: var(--amber);
      }
      .val-cyan {
        color: var(--cyan);
      }
      .val-dim {
        color: var(--ink-faint);
      }
      @media (max-width: 560px) {
        .detail-row {
          grid-template-columns: 1fr;
          gap: 2px;
        }
      }

      /* value cells that host a copy button */
      .field-value {
        position: relative;
        padding-right: 24px;
      }
      .copy-btn {
        position: absolute;
        right: 0;
        top: 0;
        width: 20px;
        height: 20px;
        display: grid;
        place-items: center;
        border: 0;
        padding: 0;
        background: transparent;
        color: var(--ink-faint);
        cursor: pointer;
        opacity: 0;
        transition:
          opacity 0.12s,
          color 0.12s;
      }
      .detail-row:hover .copy-btn,
      .field-row:hover .copy-btn {
        opacity: 1;
      }
      .copy-btn:hover {
        color: var(--amber);
      }
      .copy-btn.copied {
        color: var(--green);
        opacity: 1;
      }
      .copy-btn svg {
        width: 13px;
        height: 13px;
        fill: none;
        stroke: currentColor;
        stroke-width: 1.4;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      /* ---------- info tooltip ---------- */
      .has-tip {
        cursor: help;
      } /* no underline — just a help cursor */
      #tooltip {
        position: fixed;
        z-index: 60;
        max-width: 290px;
        pointer-events: none;
        opacity: 0;
        transform: translateY(4px);
        transition:
          opacity 0.12s,
          transform 0.12s;
        background: #1c1f25;
        color: var(--ink);
        border: 1px solid var(--line);
        box-shadow: 0 10px 34px rgba(0, 0, 0, 0.55);
        border-radius: 9px;
        padding: 9px 12px;
        font-family: var(--sans);
        font-size: 12.5px;
        line-height: 1.45;
      }
      #tooltip.visible {
        opacity: 1;
        transform: translateY(0);
      }
      #tooltip::before {
        content: "";
        position: absolute;
        left: var(--arrow-x, 20px);
        bottom: -5px;
        width: 9px;
        height: 9px;
        background: #1c1f25;
        border-right: 1px solid var(--line);
        border-bottom: 1px solid var(--line);
        transform: rotate(45deg);
      }
      #tooltip.tooltip-below::before {
        top: -5px;
        bottom: auto;
        border: 0;
        border-left: 1px solid var(--line);
        border-top: 1px solid var(--line);
      }

      /* ---------- toast ---------- */
      #toast {
        position: fixed;
        left: 50%;
        bottom: 28px;
        transform: translateX(-50%) translateY(8px);
        z-index: 70;
        background: #1c1f25;
        border: 1px solid var(--line);
        color: var(--ink);
        font-family: var(--mono);
        font-size: 12.5px;
        padding: 9px 14px;
        border-radius: 9px;
        box-shadow: 0 10px 34px rgba(0, 0, 0, 0.55);
        opacity: 0;
        pointer-events: none;
        transition:
          opacity 0.18s,
          transform 0.18s;
      }
      #toast.visible {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }

      /* ---------- UTF-8 byte matrix ---------- */
      .byte-grid {
        display: flex;
        flex-wrap: wrap;
        gap: 7px;
        padding: 4px 16px 8px;
      }
      .byte-cell {
        border: 1px solid var(--line);
        border-radius: 7px;
        background: #101216;
        padding: 7px 9px;
        text-align: center;
        min-width: 72px;
      }
      .byte-hex {
        font-family: var(--mono);
        font-size: 14px;
        color: var(--amber);
      }
      .byte-bin {
        font-family: var(--mono);
        font-size: 10px;
        letter-spacing: 0.05em;
        margin-top: 3px;
      }
      .byte-dec {
        font-family: var(--mono);
        font-size: 9.5px;
        color: var(--ink-faint);
        margin-top: 2px;
      }
      .byte-label {
        font-family: var(--mono);
        font-size: 8.5px;
        color: var(--ink-faint);
        margin-top: 4px;
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }
      .bit-marker {
        color: var(--cyan-dim);
      } /* UTF-8 structural prefix bits */
      .bit-data {
        color: var(--cyan);
        font-weight: 600;
      } /* actual code-point payload bits */
      .byte-legend {
        display: flex;
        gap: 16px;
        padding: 0 16px 14px;
        font-family: var(--mono);
        font-size: 10px;
        color: var(--ink-faint);
      }
      .byte-legend .swatch {
        display: inline-block;
        width: 9px;
        height: 9px;
        border-radius: 2px;
        margin-right: 5px;
        vertical-align: middle;
      }
      .swatch.marker {
        background: var(--cyan-dim);
      }
      .swatch.data {
        background: var(--cyan);
      }

      /* ---------- string-level cards ---------- */
      .column-pair {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 18px;
      }
      @media (max-width: 820px) {
        .column-pair {
          grid-template-columns: 1fr;
        }
      }
      .card {
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: var(--panel);
        overflow: hidden;
      }
      .card-header {
        font-family: var(--mono);
        font-size: 10.5px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--ink-dim);
        padding: 12px 16px;
        border-bottom: 1px solid var(--line-soft);
        display: flex;
        justify-content: space-between;
      }
      .status-same {
        color: var(--green);
        text-transform: none;
        letter-spacing: 0;
      }
      .status-diff {
        color: var(--rose);
        text-transform: none;
        letter-spacing: 0;
      }
      .hex-dump {
        font-family: var(--mono);
        font-size: 12px;
        line-height: 1.7;
        padding: 12px 16px;
        overflow-x: auto;
        white-space: pre;
        color: var(--ink);
      }
      .dump-dim {
        color: var(--ink-faint);
      }
      .dump-ascii {
        color: var(--cyan);
      }
      .field-list {
        padding: 8px 16px 14px;
      }
      .field-row {
        display: grid;
        grid-template-columns: 130px 1fr;
        gap: 12px;
        padding: 5px 0;
        align-items: baseline;
      }
      .field-row:hover {
        background: #181c21;
      }
      .field-row .field-label {
        font-size: 12px;
        color: var(--ink-dim);
      }
      .field-row .field-value {
        font-family: var(--mono);
        font-size: 12.5px;
        color: var(--ink);
        word-break: break-all;
      }

      /* ---------- dump selection marking & keyboard focus ---------- */
      .dump-byte,
      .dump-asc {
        border-radius: 3px;
      }
      /* the currently selected grapheme's bytes, marked persistently */
      .dump-byte.sel,
      .dump-asc.sel {
        background: var(--amber);
        color: #101216;
      }
      .grapheme-cell.more {
        display: grid;
        place-items: center;
        font-family: var(--mono);
        font-size: 12px;
        color: var(--ink-dim);
        min-height: 84px;
      }
      .grapheme-cell:focus-visible,
      .codepoint-tab:focus-visible,
      .sample-chip:focus-visible,
      .copy-btn:focus-visible {
        outline: 2px solid var(--amber);
        outline-offset: 2px;
      }

      ::selection {
        background: rgba(255, 180, 84, 0.28);
      }
      .empty-state {
        color: var(--ink-faint);
        font-family: var(--mono);
        font-size: 13px;
        padding: 40px 0;
        text-align: center;
      }
    </style>

      function utf8Bytes(cp) {
        if (cp <= 0x7f) return [cp];
        if (cp <= 0x7ff) return [0xc0 | (cp >> 6), 0x80 | (cp & 0x3f)];
        if (cp <= 0xffff)
          return [
            0xe0 | (cp >> 12),
            0x80 | ((cp >> 6) & 0x3f),
            0x80 | (cp & 0x3f),
          ];
        return [
          0xf0 | (cp >> 18),
          0x80 | ((cp >> 12) & 0x3f),
          0x80 | ((cp >> 6) & 0x3f),
          0x80 | (cp & 0x3f),
        ];
      }
      function utf16Units(cp) {
        if (cp <= 0xffff) return [cp];
        const c = cp - 0x10000;
        return [0xd800 + (c >> 10), 0xdc00 + (c & 0x3ff)];
      }
      const bin = (n, w) => n.toString(2).padStart(w, "0");
      const hex = (n, w = 2) => n.toString(16).toUpperCase().padStart(w, "0");
      const oct = (n) => n.toString(8);
      function b64(bytes) {
        let s = "";
        for (const b of bytes) s += String.fromCharCode(b);
        return btoa(s);
      }
      function groupBits(str, size = 4) {
        // pretty-print a bitstring, grouping from the right so groups
        // stay aligned with hex nibbles when the width isn't a multiple of 4
        const out = [];
        const head = str.length % size;
        if (head) out.push(str.slice(0, head));
        for (let i = head; i < str.length; i += size)
          out.push(str.slice(i, i + size));
        return out.join(" ");
      }
      // number of leading structural bits in a UTF-8 byte (rest are code-point payload bits)
      function utf8MarkerBits(b) {
        if ((b & 0x80) === 0) return 1; // 0xxxxxxx  single/ASCII
        if ((b & 0xc0) === 0x80) return 2; // 10xxxxxx  continuation
        if ((b & 0xe0) === 0xc0) return 3; // 110xxxxx  2-byte lead
        if ((b & 0xf0) === 0xe0) return 4; // 1110xxxx  3-byte lead
        if ((b & 0xf8) === 0xf0) return 5; // 11110xxx  4-byte lead
        return 0;
      }
      // render a byte's 8 bits, colouring structure vs code-point bits
      function binColored(b) {
        const bits = bin(b, 8).split("");
        const marker = utf8MarkerBits(b);
        let out = "";
        bits.forEach((bit, i) => {
          out +=
            '<span class="' +
            (i < marker ? "bit-marker" : "bit-data") +
            '">' +
            bit +
            "</span>";
          if (i === 3) out += " ";
        });
        return out;
      }

      const _propCache = new Map(); // property -> compiled RegExp (or null if invalid)

          try {
            re = new RegExp("\\p{" + prop + "}", "u");
          } catch (e) {
            re = null;
          }
          _propCache.set(prop, re);
        }
        return re ? re.test(ch) : false;
      }

        let a = _cpCache.get(cp);
        if (!a) {
          if (_cpCache.size > 20000) _cpCache.clear();
          a = computeCodepoint(cp);
          _cpCache.set(cp, a);
        }
        return a;
      }
      function computeCodepoint(cp) {
        const ch = String.fromCodePoint(cp);
        const cat = categoryOf(ch);
        const bytes = utf8Bytes(cp);
        const units = utf16Units(cp);
        const isControl =
          cat === "Cc" ||
          cat === "Cf" ||
          cat === "Cs" ||
          cat === "Co" ||
          cat === "Cn";
        const isSpace = testP("White_Space", ch);
        const zeroWidth =
          [0x200b, 0x200c, 0x200d, 0x2060, 0xfeff].includes(cp) ||
          (cp >= 0xfe00 && cp <= 0xfe0f) ||
          (cp >= 0xe0100 && cp <= 0xe01ef);
        const combining =
          testP("gc=Mn", ch) || testP("gc=Mc", ch) || testP("gc=Me", ch);
        const isEmoji = testP("Emoji", ch);
        const isPict = testP("Extended_Pictographic", ch);
        const printable = !isControl && !zeroWidth && cp !== 0x20 && cp > 0x1f;

        return {
          cp,
          ch,
          cat,
          catName: GC[cat],
          name: nameOf(cp, ch, cat),
          role: roleOf(cp, ch),
          script: scriptOf(ch),
          block: blockOf(cp),
          bytes,
          units,
          flags: {
            letter: testP("L", ch),
            number: testP("N", ch),
            punct: testP("P", ch),
            symbol: testP("S", ch),
            mark: testP("M", ch),
            uppercase: testP("Uppercase", ch),
            lowercase: testP("Lowercase", ch),
            whitespace: isSpace,
            control: isControl,
            zeroWidth,
            combining,
            emoji: isEmoji,
            emojiPresentation: testP("Emoji_Presentation", ch),
            emojiModifier: testP("Emoji_Modifier", ch),
            emojiModifierBase: testP("Emoji_Modifier_Base", ch),
            pictographic: isPict,
            bidiControl: testP("Bidi_Control", ch),
            ascii: cp <= 0x7f,
            bmp: cp <= 0xffff,
            astral: cp > 0xffff,
            printable,
            dash: testP("Dash", ch),
            quotation: testP("Quotation_Mark", ch),
            hexDigit: testP("Hex_Digit", ch),
            diacritic: testP("Diacritic", ch),
            alphabetic: testP("Alphabetic", ch),
            math: testP("gc=Sm", ch),
          },
          upper: ch.toUpperCase(),
          lower: ch.toLowerCase(),
          numericValue: numericValueOf(cp, ch),
        };
      }

      /* ============================================================
   DOM + RENDER HELPERS
   ============================================================ */

      const $ = (s) => document.querySelector(s);
      const el = (t, c, h) => {
        const e = document.createElement(t);
        if (c) e.className = c;
        if (h != null) e.innerHTML = h;
        return e;
      };
      function escapeHtml(s) {
        return s
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      const ICON_COPY =
        '<svg viewBox="0 0 16 16"><rect x="5" y="5" width="8.5" height="9.5" rx="1.6"/><path d="M3 10.5V3.6A1.6 1.6 0 0 1 4.6 2H10.5"/></svg>';
      const ICON_CHECK =
        '<svg viewBox="0 0 16 16"><path d="M3.5 8.6l3 3 6-7"/></svg>';

      function doCopy(text) {
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(text).catch(() => {});
        } else {
          const ta = el("textarea");
          ta.value = text;
          document.body.appendChild(ta);
          ta.select();
          try {
            document.execCommand("copy");
          } catch (e) {}
          ta.remove();
        }
      }
      let _toastTimer = null;
      function showToast(msg) {
        const t = $("#toast");
        t.textContent = msg;
        t.classList.add("visible");
        clearTimeout(_toastTimer);
        _toastTimer = setTimeout(() => t.classList.remove("visible"), 1800);
      }

      function copyButton(text) {
        const btn = el("button", "copy-btn", ICON_COPY);
        btn.type = "button";
        btn.setAttribute("aria-label", "Copy value");
        btn.addEventListener("click", (e) => {
          e.stopPropagation();
          doCopy(text);
          btn.innerHTML = ICON_CHECK;
          btn.classList.add("copied");
          setTimeout(() => {
            btn.innerHTML = ICON_COPY;
            btn.classList.remove("copied");
          }, 1100);
        });
        return btn;
      }
      function attachTip(node, key) {
        if (key && key in TIPS) {
          node.classList.add("has-tip");
          node.dataset.tip = TIPS[key];
        }
      }

      // a labelled row inside the detail table (with copy + optional tooltip)
      function dataRow(label, valueHtml, copyVal) {
        const row = el("div", "detail-row");
        const lab = el("div", "field-label", label);
        attachTip(lab, label);
        const val = el("div", "field-value", valueHtml);
        const text = copyVal != null ? copyVal : val.textContent;
        val.appendChild(copyButton(text));
        row.append(lab, val);
        return row;
      }
      // a labelled row inside a string-level field list
      function kvRow(label, valueHtml, copyVal) {
        const row = el("div", "field-row");
        const lab = el("div", "field-label", label);
        attachTip(lab, label);
        const val = el("div", "field-value", valueHtml);
        const text = copyVal != null ? copyVal : val.textContent;
        val.appendChild(copyButton(text));
        row.append(lab, val);
        return row;
      }
      // a detail-table group with a tooltipped heading
      function group(title) {
        const g = el("div", "detail-group");
        const head = el("div", "group-title", title);
        g.appendChild(head);
        return g;
      }
      // a pill with an optional tooltip
      function pill(label, variant) {
        const p = el("span", "pill" + (variant ? " " + variant : ""), label);
        if (PILL_TIPS[label]) {
          p.classList.add("has-tip");
          p.dataset.tip = PILL_TIPS[label];
        }
        return p;
      }

      /* ============================================================
   STATE + MAIN RENDER
   ============================================================ */

      let graphemes = []; // array of {cluster, cps:[analysis...]}
      let selGrapheme = 0;
      let selCp = 0;
      let _dumpBytes = []; // last string's UTF-8 bytes, for reflowing the hex dump on resize
      let _dumpOwners = null; // byte index -> grapheme index (null on huge inputs)
      const STRIP_LIMIT_DEFAULT = 20; // grapheme cells shown before the "show all" expander
      let stripLimit = STRIP_LIMIT_DEFAULT;
      let _lastStr = null;

      const seg = typeof Intl !== "undefined" && Intl.Segmenter;

      function splitGraphemes(str) {
        if (seg) {
          const s = new Intl.Segmenter(undefined, { granularity: "grapheme" });
          return [...s.segment(str)].map((x) => x.segment);
        }
        return [...str]; // fallback: code points
      }

      function render() {
        const str = $("#input").value;
        const empty = str.length === 0;
        $("#emptyState").style.display = empty ? "block" : "none";
        ["#stats", "#graphemeSec", "#inspectSec", "#stringSec"].forEach((s) => {
          $(s).style.display = empty ? "none" : "";
        });
        if (empty) {
          $("#warn").className = "";
          $("#warn").innerHTML = "";
          return;
        }

        if (str !== _lastStr) {
          stripLimit = STRIP_LIMIT_DEFAULT;
          _lastStr = str;
        }

        const clusters = splitGraphemes(str);
        graphemes = clusters.map((cluster) => ({
          cluster,
          cps: [...cluster].map((c) => analyzeCodepoint(c.codePointAt(0))),
        }));
        if (selGrapheme >= graphemes.length) selGrapheme = 0;

        // segment words once — shared by the stats row and the segmentation card
        const wordSegs = seg
          ? [
              ...new Intl.Segmenter(undefined, {
                granularity: "word",
              }).segment(str),
            ]
          : null;

        renderWarnings(str);
        renderStats(str, clusters, wordSegs);
        renderStrip();
        renderInspector();
        renderStringLevel(str, wordSegs);
      }

      function renderWarnings(str) {
        const found = [];
        for (const g of graphemes) {
          // ZWJ / variation selectors inside a legitimate emoji cluster are
          // expected structure, not a hidden-character red flag
          const emojiG = isEmojiCluster(g);
          for (const a of g.cps) {
            if (a.flags.bidiControl) found.push(["bidi", a]);
            else if (a.flags.zeroWidth) {
              if (!emojiG) found.push(["zw", a]);
            } else if (a.cat === "Co") found.push(["priv", a]);
            else if (
              a.flags.control &&
              a.cp !== 0x0a &&
              a.cp !== 0x09 &&
              a.cp !== 0x0d
            )
              found.push(["ctrl", a]);
          }
        }
        const w = $("#warn");
        if (!found.length) {
          w.className = "";
          w.innerHTML = "";
          return;
        }
        const types = {
          bidi: "bidirectional control characters (possible Trojan-Source / text-spoofing vector)",
          zw: "zero-width / invisible characters",
          ctrl: "control characters",
          priv: "private-use characters (renderer-dependent)",
        };
        const seen = new Set(found.map((f) => f[0]));
        const list = [...seen].map((k) => types[k]).join(", ");
        const detail = found
          .slice(0, 8)
          .map(([, a]) => "U+" + hex(a.cp, 4))
          .join(", ");
        w.className = "visible";
        w.innerHTML =
          '<div class="warning-banner"><span class="warning-icon">⚠</span><div>This string contains <b>' +
          found.length +
          "</b> hidden or non-printing character" +
          (found.length > 1 ? "s" : "") +
          " — " +
          list +
          '.<br><span style="color:var(--ink-dim);font-family:var(--mono);font-size:12px">' +
          detail +
          (found.length > 8 ? " …" : "") +
          "</span></div></div>";
      }

      function renderStats(str, clusters, wordSegs) {
        const cps = [...str];
        const utf8 = cps.reduce(
          (n, c) => n + utf8Bytes(c.codePointAt(0)).length,
          0,
        );
        const utf16 = str.length; // JS string length = UTF-16 code units
        const words = wordSegs
          ? wordSegs.filter((s) => s.isWordLike).length
          : (str.trim().match(/\S+/g) || []).length;
        const stats = [
          [
            clusters.length,
            "graphemes",
            "User-perceived characters. One emoji or accented letter counts as one, even when built from several code points.",
          ],
          [
            cps.length,
            "code points",
            "Distinct Unicode scalar values in the string — the count you get iterating with for…of or [...str].",
          ],
          [
            utf8,
            "UTF-8 bytes",
            "How many bytes the string occupies when stored/sent as UTF-8 (1–4 bytes per code point).",
          ],
          [
            utf16,
            "UTF-16 units",
            "16-bit code units — this is exactly JavaScript's string .length. Astral characters cost two.",
          ],
          [
            words,
            "words",
            "Word-like segments found by the Unicode word-segmentation algorithm.",
          ],
          [
            (str.match(/\n/g) || []).length + (str ? 1 : 0),
            "lines",
            "Number of lines (newline count + 1).",
          ],
        ];
        $("#stats").innerHTML = stats
          .map(
            ([n, k, tip]) =>
              '<div class="stat"><div class="stat-value">' +
              n +
              '</div><div class="stat-label"><span class="has-tip" data-tip="' +
              escapeHtml(tip) +
              '">' +
              k +
              "</span></div></div>",
          )
          .join("");
      }

      function displayGlyph(cluster, cps) {
        const first = cps[0];
        if (
          cps.length === 1 &&
          (first.flags.control ||
            first.flags.zeroWidth ||
            first.cp === 0x20 ||
            first.cp === 0xa0)
        ) {
          return {
            html:
              '<span class="nonprint-label">' + shortLabel(first) + "</span>",
            printable: false,
          };
        }
        return { html: escapeHtml(cluster), printable: true };
      }
      function shortLabel(a) {
        const map = {
          0x20: "SP",
          0xa0: "NBSP",
          0x09: "TAB",
          0x0a: "LF",
          0x0d: "CR",
          0x200b: "ZWSP",
          0x200c: "ZWNJ",
          0x200d: "ZWJ",
          0xfeff: "BOM",
          0x2060: "WJ",
          0xad: "SHY",
          0xfe0f: "VS16",
          0xfe0e: "VS15",
        };
        return map[a.cp] || (a.cat === "Cc" ? "CTRL" : "·");
      }

      function renderStrip() {
        const strip = $("#strip");
        strip.innerHTML = "";
        $("#graphemeHint").textContent =
          graphemes.length +
          " cluster" +
          (graphemes.length > 1 ? "s" : "") +
          " · click to inspect";
        if (selGrapheme >= stripLimit) stripLimit = graphemes.length;
        const shown = Math.min(graphemes.length, stripLimit);
        for (let i = 0; i < shown; i++) {
          const g = graphemes[i];
          const cell = el(
            "div",
            "grapheme-cell" + (i === selGrapheme ? " selected" : ""),
          );
          cell.dataset.gi = i;
          cell.setAttribute("role", "option");
          cell.setAttribute("aria-selected", i === selGrapheme);
          cell.tabIndex = i === selGrapheme ? 0 : -1;
          cell.setAttribute(
            "aria-label",
            "grapheme " +
              i +
              ", " +
              (g.cps.length === 1
                ? "U+" + hex(g.cps[0].cp, 4)
                : g.cps.length + " code points from U+" + hex(g.cps[0].cp, 4)),
          );
          const disp = displayGlyph(g.cluster, g.cps);
          cell.appendChild(el("div", "cell-index", i));
          if (g.cps.length > 1)
            cell.appendChild(el("div", "cell-badge", g.cps.length + "×"));
          cell.appendChild(el("div", "glyph", disp.html));
          cell.appendChild(
            el(
              "div",
              "cell-codepoint",
              // the N× badge shows the count; "…" marks a continuing sequence
              "U+" + hex(g.cps[0].cp, 4) + (g.cps.length > 1 ? "…" : ""),
            ),
          );
          cell.addEventListener("click", () => {
            selGrapheme = i;
            selCp = 0;
            renderStrip();
            renderInspector();
            // re-render replaced the clicked cell; restore focus to its
            // successor so arrow-key navigation keeps working
            const c = strip.querySelector('[data-gi="' + i + '"]');
            if (c) c.focus({ preventScroll: true });
            document
              .querySelector("#inspectSec")
              .scrollIntoView({ behavior: "smooth", block: "nearest" });
          });
          strip.appendChild(cell);
        }
        if (graphemes.length > shown) {
          const more = el(
            "button",
            "grapheme-cell more",
            "+" + (graphemes.length - shown) + " more",
          );
          more.type = "button";
          more.addEventListener("click", () => {
            stripLimit = graphemes.length;
            renderStrip();
          });
          strip.appendChild(more);
        }
      }

      function renderInspector() {
        const g = graphemes[selGrapheme];
        if (!g) return;
        if (selCp >= g.cps.length) selCp = 0;

        const disp = displayGlyph(g.cluster, g.cps);
        const bigInner = disp.printable
          ? escapeHtml(g.cluster)
          : '<div class="nonprint-note">' +
            escapeHtml(
              g.cps[0].name ? prettyName(g.cps[0].name) : g.cps[0].catName,
            ) +
            "<br>«non-printing»</div>";
        const utf8len = g.cps.reduce((n, a) => n + a.bytes.length, 0);
        const utf16len = g.cps.reduce((n, a) => n + a.units.length, 0);
        $("#specimen").innerHTML =
          '<div class="specimen-canvas">' +
          bigInner +
          "</div>" +
          '<div class="specimen-meta">' +
          '<div class="specimen-codepoint">' +
          g.cps.map((a) => "U+" + hex(a.cp, 4)).join(" ") +
          "</div>" +
          '<div class="specimen-name">' +
          (g.cps.length > 1
            ? "Grapheme cluster of " + g.cps.length + " code points"
            : escapeHtml(
                g.cps[0].name ? prettyName(g.cps[0].name) : g.cps[0].catName,
              )) +
          "</div>" +
          '<div class="specimen-sub">' +
          g.cps.length +
          " code point" +
          (g.cps.length > 1 ? "s" : "") +
          " · " +
          utf8len +
          " UTF-8 bytes · " +
          utf16len +
          " UTF-16 units</div>" +
          "</div>" +
          clusterPills(g) +
          emojiVariants(g);
        _variantToken++;
        if (isEmojiCluster(g)) resolveMicrosoft(g.cluster, _variantToken);
        resolveNames(g, _variantToken);
        $("#inspectHint").textContent =
          "grapheme " +
          selGrapheme +
          (g.cps.length > 1 ? " · " + g.cps.length + " code points" : "");

        const cpsel = $("#cpsel");
        cpsel.innerHTML = "";
        if (g.cps.length > 1) {
          g.cps.forEach((a, i) => {
            const t = el(
              "div",
              "codepoint-tab" + (i === selCp ? " selected" : ""),
              "U+" +
                hex(a.cp, 4) +
                ' <span class="tab-role">' +
                a.role +
                "</span>",
            );
            t.setAttribute("role", "tab");
            t.setAttribute("aria-selected", i === selCp);
            t.tabIndex = i === selCp ? 0 : -1;
            t.addEventListener("click", () => {
              selCp = i;
              renderInspector();
            });
            cpsel.appendChild(t);
          });
        }
        renderDetail(g.cps[selCp]);
        syncDumpSelection();
      }

      function clusterPills(g) {
        const set = new Set();
        for (const a of g.cps) {
          if (a.flags.emoji) set.add("emoji");
          if (g.cps.some((x) => x.cp === 0x200d)) set.add("ZWJ sequence");
          if (a.flags.emojiModifier) set.add("skin tone");
          if (a.cp >= 0x1f1e6 && a.cp <= 0x1f1ff) set.add("flag");
          if (a.flags.combining) set.add("has combining mark");
          if (a.flags.astral) set.add("astral");
          if (a.flags.zeroWidth) set.add("invisible");
          if (a.flags.bidiControl) set.add("bidi control");
        }
        if (!set.size) return "";
        const variant = {
          "ZWJ sequence": "pill-violet",
          flag: "pill-violet",
          emoji: "pill-amber",
          "skin tone": "pill-amber",
        };
        return (
          '<div class="pill-row">' +
          [...set]
            .map((s) => {
              const cls =
                "pill " +
                (variant[s] || "pill-cyan") +
                (PILL_TIPS[s] ? " has-tip" : "");
              const tip = PILL_TIPS[s]
                ? ' data-tip="' + escapeHtml(PILL_TIPS[s]) + '"'
                : "";
              return '<span class="' + cls + '"' + tip + ">" + s + "</span>";
            })
            .join("") +
          "</div>"
        );
      }

      // is this cluster an emoji worth showing platform renderings for?
      // (excludes bare ASCII digits/#/* which carry the Emoji property but
      // only render as emoji with an explicit VS16 / keycap)
      function isEmojiCluster(g) {
        return g.cps.some(
          (a) =>
            (a.cp >= 0x1f1e6 && a.cp <= 0x1f1ff) || // regional-indicator flag
            a.cp === 0xfe0f || // explicit emoji presentation
            a.flags.emojiPresentation || // defaults to emoji
            a.flags.emojiModifier, // skin-tone modifier
        );
      }

      // Per-platform emoji artwork, keyed by the cluster's codepoint sequence.
      // Each vendor exposes a codepoint-addressable image feed on a public CDN;
      // `url(code)` builds the URL and `up` marks vendors that use UPPERCASE
      // hex filenames. Every image tries the raw sequence first, then a copy
      // with VS16 (FE0F) stripped, then hides itself — so missing artwork just
      // drops out of the grid.  (Samsung / WhatsApp have no such public feed.)
      const dsUrl = (v) => (code) =>
        "https://cdn.jsdelivr.net/npm/emoji-datasource-" +
        v +
        "/img/" +
        v +
        "/64/" +
        code +
        ".png";
      const EMOJI_VENDORS = [
        { label: "Apple", sub: "iOS · macOS", url: dsUrl("apple") },
        { label: "Google", sub: "Android · Noto", url: dsUrl("google") },
        { label: "Facebook", sub: "Messenger", url: dsUrl("facebook") },
        { label: "Twitter", sub: "Twemoji · X", url: dsUrl("twitter") },
        {
          label: "JoyPixels",
          sub: "Discord-era",
          url: (c) =>
            "https://cdn.jsdelivr.net/joypixels/assets/8.0/png/unicode/64/" +
            c +
            ".png",
        },
        {
          label: "OpenMoji",
          sub: "Open source",
          up: true,
          url: (c) =>
            "https://cdn.jsdelivr.net/gh/hfg-gmuend/openmoji@master/color/72x72/" +
            c +
            ".png",
        },
      ];
      function emojiCodeSeq(cluster, stripVS, upper) {
        return [...cluster]
          .map((c) => c.codePointAt(0))
          .filter((cp) => !(stripVS && cp === 0xfe0f))
          .map((cp) => cp.toString(16).padStart(4, "0"))
          .join("-")
          [upper ? "toUpperCase" : "toLowerCase"]();
      }
      function emojiVariants(g) {
        if (!isEmojiCluster(g)) return "";
        const cells = EMOJI_VENDORS.map((v) => {
          const full = emojiCodeSeq(g.cluster, false, v.up);
          const bare = emojiCodeSeq(g.cluster, true, v.up); // VS16 stripped
          const hide = "this.closest('.emoji-variant').style.display='none'";
          // try full sequence, fall back to FE0F-stripped, then hide the cell
          const onerror =
            bare !== full
              ? "if(this.dataset.f){" +
                hide +
                "}else{this.dataset.f=1;this.src='" +
                v.url(bare) +
                "'}"
              : hide;
          return (
            '<div class="emoji-variant">' +
            '<img loading="lazy" alt="' +
            escapeHtml(v.label) +
            ' rendering" src="' +
            v.url(full) +
            '" onerror="' +
            onerror +
            '">' +
            '<div class="emoji-variant-name">' +
            v.label +
            "</div>" +
            '<div class="emoji-variant-sub">' +
            v.sub +
            "</div>" +
            "</div>"
          );
        }).join("");
        // Microsoft (Fluent) is name-keyed, so it's resolved asynchronously
        // after render (see resolveMicrosoft); starts hidden until artwork loads.
        const ms =
          '<div class="emoji-variant" id="msVariant" style="display:none">' +
          '<img loading="lazy" alt="Microsoft rendering">' +
          '<div class="emoji-variant-name">Microsoft</div>' +
          '<div class="emoji-variant-sub">Fluent · Windows</div>' +
          "</div>";
        return (
          '<div class="emoji-variants">' +
          '<div class="emoji-variants-head">Platform renderings</div>' +
          '<div class="emoji-variant-grid">' +
          cells +
          ms +
          "</div></div>"
        );
      }

      // Microsoft's Fluent emoji are stored by CLDR name, not codepoint, so we
      // need a codepoint→label map. emojibase's compact dataset provides it;
      // it's fetched lazily (once) the first time an emoji is inspected.
      let _emojiLabels = null;
      let _emojiLabelsPromise = null;
      function loadEmojiLabels() {
        if (_emojiLabels) return Promise.resolve(_emojiLabels);
        if (_emojiLabelsPromise) return _emojiLabelsPromise;
        _emojiLabelsPromise = fetch(
          "https://cdn.jsdelivr.net/npm/emojibase-data@latest/en/compact.json",
        )
          .then((r) => {
            if (!r.ok) throw new Error("HTTP " + r.status);
            return r.json();
          })
          .then((list) => {
            // skin-tone variants live in each entry's nested skins array
            _emojiLabels = new Map();
            for (const e of list) {
              _emojiLabels.set(e.hexcode, e.label);
              for (const s of e.skins || [])
                _emojiLabels.set(s.hexcode, s.label);
            }
            return _emojiLabels;
          })
          .catch(() => {
            // failed fetch: empty map now, cleared promise allows a retry
            _emojiLabelsPromise = null;
            return new Map();
          });
        return _emojiLabelsPromise;
      }
      // cluster -> emojibase label; falls back to a VS16-stripped key since
      // emojibase hexcodes are inconsistent about including FE0F
      function emojiLabelFor(labels, cluster) {
        // emojibase hexcodes are zero-padded to 4 digits ("0031-FE0F-20E3")
        const key = (arr) =>
          arr
            .map((cp) => cp.toString(16).toUpperCase().padStart(4, "0"))
            .join("-");
        const cps = [...cluster].map((c) => c.codePointAt(0));
        return (
          labels.get(key(cps)) ||
          labels.get(key(cps.filter((cp) => cp !== 0xfe0f))) ||
          null
        );
      }
      // pretty-print a CLDR label for display ("flag: France" → "Flag:
      // France") — capitalizes each word without touching existing capitals
      function prettyLabel(s) {
        return s.replace(
          /(^|[\s(:\-])([a-z])/g,
          (m, p, c) => p + c.toUpperCase(),
        );
      }
      // "LATIN SMALL LETTER A" → "Latin Small Letter A", preserving acronym
      // and hex/digit tokens ("CJK Unified Ideograph-4E01", "Line Feed (LF)")
      const NAME_ACRONYMS = new Set(
        "CJK,APL,OCR,NKO,BOM,TAB,LF,VT,FF,CR,NEL".split(","),
      );
      function prettyName(s) {
        return s
          .split(" ")
          .map((w) =>
            w
              .split("-")
              .map((p) => {
                const core = p.replace(/[^A-Z0-9]/g, "");
                if (/\d/.test(p) || NAME_ACRONYMS.has(core)) return p;
                return p.charAt(0).toUpperCase() + p.slice(1).toLowerCase();
              })
              .join("-"),
          )
          .join(" ");
      }
      // true when the CLDR label adds nothing over the formal name (word
      // subset: "regional indicator F" ⊆ REGIONAL INDICATOR SYMBOL LETTER F)
      function nameSubsumes(formal, cldr) {
        if (!formal) return false;
        const have = new Set(formal.toLowerCase().split(/[^a-z0-9]+/));
        return cldr
          .toLowerCase()
          .split(/[^a-z0-9]+/)
          .every((w) => !w || have.has(w));
      }

      // ---- formal Unicode names (UnicodeData.txt) ----
      // unicode.org sends no CORS headers, so we fetch the latex3 project's
      // verbatim mirror of the official file (~300 KB gzipped, lazily, once)
      let _cpNames = null;
      let _cpNamesPromise = null;
      function loadCpNames() {
        if (_cpNames) return Promise.resolve(_cpNames);
        if (_cpNamesPromise) return _cpNamesPromise;
        _cpNamesPromise = fetch(
          "https://cdn.jsdelivr.net/gh/latex3/unicode-data@1.18/UnicodeData.txt",
        )
          .then((r) => {
            if (!r.ok) throw new Error("HTTP " + r.status);
            return r.text();
          })
          .then((txt) => {
            const map = new Map();
            const ranges = [];
            let first = null;
            for (const line of txt.split("\n")) {
              const s1 = line.indexOf(";");
              if (s1 < 0) continue;
              const s2 = line.indexOf(";", s1 + 1);
              const name = line.slice(s1 + 1, s2);
              const cp = parseInt(line.slice(0, s1), 16);
              if (name.charCodeAt(0) === 60 /* "<" */) {
                // <…, First>/<…, Last> markers become algorithmic-name
                // ranges; <control> etc. are covered by the local tables
                if (name.endsWith(", First>")) first = [cp, name.slice(1, -8)];
                else if (name.endsWith(", Last>") && first) {
                  ranges.push([first[0], cp, first[1]]);
                  first = null;
                }
                continue;
              }
              map.set(cp, name);
            }
            _cpNames = { map, ranges };
            return _cpNames;
          })
          .catch(() => {
            // failed fetch: empty database now, cleared promise allows a retry
            _cpNamesPromise = null;
            return { map: new Map(), ranges: [] };
          });
        return _cpNamesPromise;
      }
      // Hangul syllable names are algorithmic (Unicode ch. 3.12): jamo
      // short names for the leading consonant, vowel and trailing consonant
      const HANGUL_L = "G,GG,N,D,DD,R,M,B,BB,S,SS,,J,JJ,C,K,T,P,H".split(",");
      const HANGUL_V =
        "A,AE,YA,YAE,EO,E,YEO,YE,O,WA,WAE,OE,YO,U,WEO,WE,WI,YU,EU,YI,I".split(
          ",",
        );
      const HANGUL_T =
        ",G,GG,GS,N,NJ,NH,D,L,LG,LM,LB,LS,LT,LP,LH,M,B,BS,S,SS,NG,J,C,K,T,P,H".split(
          ",",
        );
      function hangulName(cp) {
        const s = cp - 0xac00;
        return (
          "HANGUL SYLLABLE " +
          HANGUL_L[(s / 588) | 0] +
          HANGUL_V[((s % 588) / 28) | 0] +
          HANGUL_T[s % 28]
        );
      }
      function formalNameFor(db, cp) {
        const hit = db.map.get(cp);
        if (hit) return hit;
        for (const [lo, hi, kind] of db.ranges) {
          if (cp < lo || cp > hi) continue;
          if (kind.startsWith("CJK Ideograph"))
            return "CJK UNIFIED IDEOGRAPH-" + hex(cp, 4);
          if (kind.startsWith("Tangut Ideograph"))
            return "TANGUT IDEOGRAPH-" + hex(cp, 4);
          if (kind.startsWith("Hangul Syllable")) return hangulName(cp);
          return null; // surrogate / private use — the category says it all
        }
        return null;
      }
      let _variantToken = 0; // invalidates in-flight lookups when selection changes
      function resolveMicrosoft(cluster, token) {
        loadEmojiLabels().then((labels) => {
          if (token !== _variantToken) return; // selection moved on
          const cell = $("#msVariant");
          if (!cell) return;
          const label = emojiLabelFor(labels, cluster);
          if (!label) return; // no clean name (skin-tone/ZWJ combos) → stay hidden
          const folder = label.charAt(0).toUpperCase() + label.slice(1);
          const base = label
            .toLowerCase()
            .replace(/[^a-z0-9]+/g, "_")
            .replace(/^_+|_+$/g, "");
          const root =
            "https://cdn.jsdelivr.net/gh/microsoft/fluentui-emoji@main/assets/" +
            encodeURIComponent(folder);
          // plain emoji live under 3D/…; skin-tone-capable ones nest a Default/
          const candidates = [
            root + "/3D/" + base + "_3d.png",
            root + "/Default/3D/" + base + "_3d_default.png",
            root + "/Color/" + base + "_color.svg",
            root + "/Default/Color/" + base + "_color_default.svg",
          ];
          const img = cell.querySelector("img");
          let i = 0;
          img.onload = () => {
            if (token === _variantToken) cell.style.display = "";
          };
          img.onerror = () => {
            if (i < candidates.length) img.src = candidates[i++];
          };
          img.src = candidates[i++];
        });
      }

      // Async fill of the Name row and specimen header: formal names from
      // UnicodeData.txt (when nameOf() had no local entry) plus CLDR emoji
      // names, quoted alongside only when they add anything. Failed loads
      // skip their fills; the token check drops stale ones.
      function resolveNames(g, token) {
        const a = g.cps[selCp];
        const wantFormal = a && !a.name;
        const wantEmoji = isEmojiCluster(g);
        if (!wantFormal && !wantEmoji) return;
        Promise.all([
          wantFormal ? loadCpNames() : null,
          wantEmoji ? loadEmojiLabels() : null,
        ]).then(([db, labels]) => {
          if (token !== _variantToken) return;
          const formalRaw =
            a.name || (db ? formalNameFor(db, a.cp) : null) || null;
          const formal = formalRaw && prettyName(formalRaw);
          let cldr = null;
          if (labels) {
            const raw = emojiLabelFor(labels, String.fromCodePoint(a.cp));
            if (raw && !nameSubsumes(formalRaw, raw)) cldr = prettyLabel(raw);
          }
          // rebuild the unified Name row if async data added anything
          const main = formal || cldr;
          if (main && (cldr || !a.name)) {
            const old = $("#nameRow");
            if (old) {
              const html =
                escapeHtml(main) +
                (formal && cldr
                  ? ' <span class="val-dim">· “' + escapeHtml(cldr) + "”</span>"
                  : "");
              const fresh = dataRow("Name", html, main);
              fresh.id = "nameRow";
              old.replaceWith(fresh);
            }
          }
          const nameEl = $("#specimen .specimen-name");
          if (nameEl) {
            const clusterLabel = labels && emojiLabelFor(labels, g.cluster);
            if (clusterLabel && (g.cps.length > 1 || !g.cps[0].name))
              nameEl.textContent = prettyLabel(clusterLabel);
            else if (g.cps.length === 1 && !g.cps[0].name && formal)
              nameEl.textContent = formal;
          }

      }

      function renderDetail(a) {
        const d = $("#detail");
        d.innerHTML = "";
        const cp = a.cp;

        // ---- Identity ----
        const g1 = group("Identity");
        g1.appendChild(
          dataRow(
            "Character",
            a.flags.printable
              ? escapeHtml(a.ch)
              : '<span class="val-dim">' +
                  escapeHtml(a.name ? prettyName(a.name) : a.catName) +
                  " (non-printing)</span>",
            a.ch,
          ),
        );
        // unified Name row — local names render now, resolveNames may
        // rebuild it with fetched data; hidden while empty
        const nameRow = dataRow(
          "Name",
          a.name ? escapeHtml(prettyName(a.name)) : "",
          a.name ? prettyName(a.name) : null,
        );
        nameRow.id = "nameRow";
        if (!a.name) nameRow.style.display = "none";
        g1.appendChild(nameRow);
        // sentence-cased here to sit alongside Category/Script/Block values;
        // the codepoint-tab annotations keep the lowercase tag form
        const roleSent = a.role.charAt(0).toUpperCase() + a.role.slice(1);
        g1.appendChild(
          dataRow(
            "Role in cluster",
            '<span class="val-cyan">' + roleSent + "</span>",
            roleSent,
          ),
        );
        g1.appendChild(
          dataRow(
            "Category",
            a.cat + ' <span class="val-dim">— ' + a.catName + "</span>",
            a.cat,
          ),
        );
        g1.appendChild(dataRow("Script", a.script));
        g1.appendChild(dataRow("Block", a.block));
        d.appendChild(g1);

        // ---- Code Point ----
        const g2 = group("Code Point");
        g2.appendChild(
          dataRow(
            "Unicode",
            '<span class="val-accent">U+' + hex(cp, 4) + "</span>",
            "U+" + hex(cp, 4),
          ),
        );
        g2.appendChild(
          dataRow(
            "Decimal",
            '<span class="val-accent">' + cp + "</span>",
            String(cp),
          ),
        );
        g2.appendChild(
          dataRow(
            "Hexadecimal",
            "0x" + hex(cp, cp > 0xffff ? 6 : 4),
            "0x" + hex(cp, cp > 0xffff ? 6 : 4),
          ),
        );
        g2.appendChild(dataRow("Octal", "0o" + oct(cp), "0o" + oct(cp)));
        g2.appendChild(
          dataRow(
            "Binary",
            '<span class="val-cyan">' +
              groupBits(bin(cp, cp > 0xffff ? 21 : cp > 0xff ? 16 : 8)) +
              "</span>",
            bin(cp, cp > 0xffff ? 21 : cp > 0xff ? 16 : 8),
          ),
        );
        d.appendChild(g2);

        // ---- UTF-8 ----
        const g3 = group(
          "UTF-8 · " +
            a.bytes.length +
            " byte" +
            (a.bytes.length > 1 ? "s" : ""),
        );
        const grid = el("div", "byte-grid");
        a.bytes.forEach((b, i) => {
          const roleLbl =
            a.bytes.length === 1 ? "single" : i === 0 ? "lead" : "cont " + i;
          grid.appendChild(
            el(
              "div",
              "byte-cell",
              '<div class="byte-hex">' +
                hex(b, 2) +
                "</div>" +
                '<div class="byte-bin">' +
                binColored(b) +
                "</div>" +
                '<div class="byte-dec">' +
                b +
                "</div>" +
                '<div class="byte-label">' +
                roleLbl +
                "</div>",
            ),
          );
        });
        g3.appendChild(grid);
        g3.appendChild(
          el(
            "div",
            "byte-legend",
            '<span><span class="swatch marker"></span>structure bits</span><span><span class="swatch data"></span>code-point bits</span>',
          ),
        );
        g3.appendChild(
          dataRow("Hex bytes", a.bytes.map((b) => hex(b, 2)).join(" ")),
        );
        g3.appendChild(
          dataRow(
            "Escaped",
            a.bytes.map((b) => "\\x" + hex(b, 2).toLowerCase()).join(""),

        );
        d.appendChild(g3);

        const g4 = group("UTF-16 & UTF-32");

          dataRow(

          ["Math", F.math],
          ["Mark / diacritic", F.mark || F.diacritic],
          ["Combining", F.combining],
          ["Whitespace", F.whitespace],
          ["Control", F.control],

          ["Uppercase", F.uppercase],
          ["Lowercase", F.lowercase],

          ["Emoji base", F.emojiModifierBase],

          ["Dash", F.dash],
          ["Quotation mark", F.quotation],
          ["Hex digit", F.hexDigit],
          ["BMP", F.bmp],

        const pw = el("div", "pill-row");
        pw.style.padding = "4px 16px 16px";

          if (on) pw.appendChild(pill(label, "pill-cyan"));
